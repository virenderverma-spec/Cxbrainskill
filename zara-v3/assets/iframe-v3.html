});

// ── UI Helpers ──────────────────────────────────────────────
function showLoading(show) {
  document.getElementById('loading-bar').className = 'loading-bar' + (show ? ' active' : '');
}

function showPlaceholder(containerId, html) {
  document.getElementById(containerId).innerHTML = '<div class="ctx-placeholder">' + html + '</div>';
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.ci-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.ci-tab-content').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('tab-' + tabId).classList.add('active');
}

function fmtDate(v) {
  if (!v || v === 'null') return '—';
  try { var d = new Date(v); return isNaN(d) ? v : d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}); }
  catch(e) { return v; }
}

function fmtDateTime(v) {
  if (!v || v === 'null') return '—';
  try {
    var d = new Date(v);
    if (isNaN(d)) return v;
    return d.toLocaleDateString('en-US', {month:'short',day:'numeric'}) +
      ' ' + d.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',hour12:true});
  } catch(e) { return v; }
}

function statusBadge(v) {
  if (!v || v === 'null') return '<span class="badge badge-gray">—</span>';
  var u = String(v).toUpperCase().replace(/[_\-\s]/g, '');
  var cls = 'badge-gray';
  if (['ACTIVE','COMPLETED','DONE','ACTIVATED','SUCCESS','RELEASED'].indexOf(u) !== -1) cls = 'badge-green';
  else if (['INPROGRESS','PENDING','DRAFT','INSTALLED','PROCESSING','WAITING','SUBMITTED'].indexOf(u) !== -1) cls = 'badge-amber';
  else if (['SUSPENDED','FAILED','CANCELLED','ERROR','REJECTED','TERMINATED'].indexOf(u) !== -1) cls = 'badge-red';
  return '<span class="badge ' + cls + '">' + escapeHtml(v) + '</span>';
}

function ctxRow(label, value, mono) {
  return '<div class="ctx-row"><span class="lbl">' + escapeHtml(label) + '</span><span class="val' + (mono ? ' mono' : '') + '">' + (value || '—') + '</span></div>';
}

function markdownToHtml(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n- /g, '\n&bull; ')
    .replace(/\n\d+\. /g, function(m) { return '\n' + m.trim() + ' '; })
    .replace(/\n/g, '<br>');
}

// ── v3: LOB Functions ─────────────────────────────────────────

async function loadLobRegistry() {
  try {
    var resp = await zaraFetch(serverUrl + '/api/lob/registry');
    var data = await resp.json();
    lobRegistry = data.lobs || [];
    // Populate LOB picker dropdown
    var select = document.getElementById('lob-select');
    if (select) {
      select.innerHTML = '<option value="">-- Select LOB --</option>';
      for (var i = 0; i < lobRegistry.length; i++) {
        var lob = lobRegistry[i];
        select.innerHTML += '<option value="' + lob.lobId + '">' + lob.icon + ' ' + lob.displayName + '</option>';
      }
    }
  } catch (e) { console.warn('LOB registry load failed:', e); }
}

function setLob(lobId) {
  if (!lobId) { currentLob = null; return; }
  var lob = lobRegistry.find(function(l) { return l.lobId === lobId; });
  if (lob) {
    currentLob = lob;
    showLobBadge(lob);
    document.getElementById('lob-picker').style.display = 'none';
    updateAIGreeting();
    // Reload with LOB context
    if (requesterEmail) loadAll(requesterEmail);
  }
}

function showLobBadge(lob) {
  var banner = document.getElementById('lob-banner');
  if (!banner) return;
  banner.style.display = 'flex';
  document.getElementById('lob-icon').textContent = lob.icon || '';
  document.getElementById('lob-name').textContent = (lob.displayName || '').toUpperCase();
  // Apply LOB color as CSS variables for theming
  document.documentElement.style.setProperty('--lob-color', lob.color || '#1F73B7');
  // Compute light bg from color
  var lobBg = lob.color ? hexToLobBg(lob.color) : '#EDF7FF';
  document.documentElement.style.setProperty('--lob-bg', lobBg);
}

function hexToLobBg(hex) {
  // Convert hex to rgba with low opacity for light background
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',0.08)';
}

function showLobPicker() {
  document.getElementById('lob-banner').style.display = 'none';
  document.getElementById('lob-picker').style.display = 'block';
}

function updateLobFromResponse(data) {
  // data.lob comes from agent-brief or lookup response
  var lob = data.lob || (data.lobConfig ? { lobId: data.lobConfig.lobId, displayName: data.lobConfig.displayName, shortName: data.lobConfig.shortName, color: data.lobConfig.color, icon: data.lobConfig.icon } : null);
  if (lob && lob.lobId) {
    currentLob = lob;
    showLobBadge(lob);
    document.getElementById('lob-picker').style.display = 'none';
    // Update ticket tag in LOB banner
    var tagEl = document.getElementById('lob-tag');
    if (tagEl && data.ticketId) {
      tagEl.textContent = 'Ticket #' + data.ticketId;
    }
  } else if (!currentLob) {
    // LOB not detected — show picker
    showLobPicker();
  }
}

// ── Load All (parallel calls) ────────────────────────────────
async function loadAll(email) {
  showLoading(true);
  showPlaceholder('agent-brief-data', 'Loading agent brief...');
  showPlaceholder('ctx-data', 'Querying Databricks + Boss API...');
  showPlaceholder('sla-data', 'Loading SLA data...');

  var btn = document.getElementById('ctx-search-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Looking up...'; }

  // Load SLA in parallel (non-blocking)
  loadSla(email);

  try {
    // v3: include lobId if manually selected
    var briefBody = { email: email };
    if (currentLob) briefBody.lobId = currentLob.lobId;

    dbg('Fetching lookup + brief for ' + email);
    var [lookupResp, briefResp] = await Promise.all([
      zaraFetch(serverUrl + '/api/customer/lookup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email }),
      }),
      zaraFetch(serverUrl + '/api/customer/agent-brief', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(briefBody),
      }),
    ]);
    dbg('Responses received');

    lookupData = await lookupResp.json();
    briefData = await briefResp.json();

    // v3: Update LOB from response
    if (briefData.found) updateLobFromResponse(briefData);
    else if (lookupData.found && lookupData.lob) updateLobFromResponse(lookupData);

    // Update AI greeting with LOB context
    updateAIGreeting();

    // Render Context tab
    var dataDiv = document.getElementById('ctx-data');
    if (lookupData.error) {
      dataDiv.innerHTML = '<div class="ctx-placeholder">Error: ' + escapeHtml(String(lookupData.error)) + '</div>';
    } else if (!lookupData.found) {
      dataDiv.innerHTML = '<div class="ctx-placeholder">No customer found for this email.</div>';
    } else {
      renderCustomerContext(lookupData, dataDiv);
    }

    // Render Agent Brief tab
    var briefDiv = document.getElementById('agent-brief-data');
    if (briefData.error) {
      briefDiv.innerHTML = '<div class="ctx-placeholder">Error: ' + escapeHtml(String(briefData.error)) + '</div>';
    } else if (!briefData.found) {
      briefDiv.innerHTML = '<div class="ctx-placeholder">No customer found for this email.</div>';
    } else {
      renderAgentBrief(briefData, briefDiv);
    }
  } catch (err) {
    dbg('LOAD ERROR: ' + (err.message || String(err)));
    showPlaceholder('ctx-data', 'Failed to connect to ' + escapeHtml(serverUrl) + '. Error: ' + escapeHtml(err.message || String(err)));
    showPlaceholder('agent-brief-data', 'Failed to connect to ' + escapeHtml(serverUrl) + '. Error: ' + escapeHtml(err.message || String(err)));
  } finally {
    showLoading(false);
    if (btn) { btn.disabled = false; btn.textContent = 'Look Up'; }
  }
}

function refreshAll() {
  if (requesterEmail) loadAll(requesterEmail);
}

// ── Extract from Boss API ────────────────────────────────────
function extractFromBossApi(data) {
  var ind = data.individual;
  var sim = data.simProducts;
  var info = { msisdn: null, imei: null, deviceInfo: null, iccid: null, imsi: null, simStatus: null, numberStatus: null, hasActiveProducts: false };

  if (ind && ind.customers && ind.customers.length > 0 && ind.customers[0].status) {
    info.numberStatus = ind.customers[0].status;
  }

  if (ind && ind.products) {
    for (var i = 0; i < ind.products.length; i++) {
      var prod = ind.products[i];
      var ps = (prod.status || '').toLowerCase();
      if (ps === 'active' || ps === 'pendingactive') info.hasActiveProducts = true;
      if (prod.realizingResource) {
        for (var j = 0; j < prod.realizingResource.length; j++) {
          var r = prod.realizingResource[j];
          if (r.type === 'MSISDN' && r.value) info.msisdn = r.value;
          if (r.type === 'ICCID' && r.value) info.iccid = r.value;
          if (r.type === 'IMSI' && r.value) info.imsi = r.value;
        }
      }
      if (prod.productCharacteristic) {
        for (var j = 0; j < prod.productCharacteristic.length; j++) {
          var ch = prod.productCharacteristic[j];
          if (ch.name && ch.name.toUpperCase().indexOf('IMEI') !== -1 && ch.value) {
            info.imei = ch.value;
          }
          if (ch.name && ch.name.toUpperCase().indexOf('DEVICE') !== -1 && ch.value) {
            info.deviceInfo = ch.value;
          }
        }
      }
    }
  }

  if (sim && sim.active && sim.active.length > 0) {
    info.simStatus = sim.active[0].status;
    for (var i = 0; i < sim.active.length; i++) {
      if (sim.active[i].realizingResource) {
        for (var j = 0; j < sim.active[i].realizingResource.length; j++) {
          var r = sim.active[i].realizingResource[j];
          if (r.type === 'ICCID' && r.value && !info.iccid) info.iccid = r.value;
          if (r.type === 'IMSI' && r.value && !info.imsi) info.imsi = r.value;
        }
      }
    }
  }

  if (!info.msisdn && data.msisdn) info.msisdn = data.msisdn;
  return info;
}

// ── Funnel Renderer ──────────────────────────────────────────
function renderFunnel(data) {
  var order = data.orders && data.orders[0];
  var boss = extractFromBossApi(data);
  var paymentDone = !!(order && order.paymentCompleted) || boss.hasActiveProducts;
  var esimProfile = data.esimProfile;
  var esimStatus = esimProfile ? String(esimProfile.status || '').toUpperCase() : '';
  var airvet = data.airvet;

  // v3: Use LOB-specific funnel steps if available from briefData
  var lobSteps = null;
  if (briefData && briefData.lobConfig && briefData.lobConfig.funnelSteps) {
    lobSteps = briefData.lobConfig.funnelSteps;
  } else if (currentLob && currentLob.funnelSteps) {
    lobSteps = currentLob.funnelSteps;
  }

  var stages;
  if (lobSteps) {
    // Dynamic funnel from LOB registry
    stages = lobSteps.map(function(step) {
      var cls = 'pending';
      // Compute status based on field mapping
      if (step.field && order && order[step.field]) cls = 'completed';
      else if (step.id === 'signup' || step.id === 'account') cls = order ? 'completed' : 'pending';
      else if (step.id === 'payment') {
        if (paymentDone) cls = 'completed';
        else if (order && order.status && order.status.toUpperCase() === 'FAILED') cls = 'error';
        else if (order) cls = 'current';
      } else if (step.id === 'number') {
        if (boss.msisdn) cls = 'completed';
        else if (paymentDone) cls = 'current';
      } else if (step.id === 'esim') {
        if (['INSTALLED', 'ENABLED'].indexOf(esimStatus) !== -1) cls = 'completed';
        else if (['ERROR', 'FAILED'].indexOf(esimStatus) !== -1) cls = 'error';
        else if (boss.msisdn && (esimStatus || boss.iccid)) cls = 'current';
      } else if (step.id === 'airvet') {
        if (airvet && airvet.activated) cls = 'completed';
        else if (esimStatus && ['INSTALLED', 'ENABLED'].indexOf(esimStatus) !== -1) cls = 'current';
      } else if (step.id === 'activation' || step.id === 'active') {
        if (order && order.onboardingCompleted) cls = 'completed';
        else if (order && order.activationCompleted) cls = 'completed';
      }
      // For LOB-specific steps with field mapping, check order data
      if (step.field && step.field !== 'paymentCompleted' && step.field !== 'activationCompleted' && step.field !== 'onboardingCompleted') {
        if (order && order[step.field]) cls = 'completed';
      }
      return { name: step.label, cls: cls };
    });
  } else {
    // Default Meow Mobile funnel (backward compatible)
    var accountCls = order ? 'completed' : 'pending';
    var paymentCls = 'pending';
    if (paymentDone) paymentCls = 'completed';
    else if (order && order.status && order.status.toUpperCase() === 'FAILED') paymentCls = 'error';
    else if (order) paymentCls = 'current';
    var numberCls = 'pending';
    if (boss.msisdn) numberCls = 'completed';
    else if (paymentDone) numberCls = 'current';
    var esimCls = 'pending';
    if (['INSTALLED', 'ENABLED'].indexOf(esimStatus) !== -1) esimCls = 'completed';
    else if (['ERROR', 'FAILED'].indexOf(esimStatus) !== -1) esimCls = 'error';
    else if (numberCls === 'completed' && (esimStatus || boss.iccid)) esimCls = 'current';
    var airvetCls = 'pending';
    if (airvet && airvet.activated) airvetCls = 'completed';
    else if (esimCls === 'completed') airvetCls = 'current';

    stages = [
      { name: 'Account', cls: accountCls },
      { name: 'Payment', cls: paymentCls },
      { name: 'Number', cls: numberCls },
      { name: 'eSIM', cls: esimCls },
      { name: 'Airvet', cls: airvetCls },
    ];
  }

  // Churn detection — suspended or terminated individual
  var indStatus = '';
  if (data.individual) {
    indStatus = String(data.individual.status || '').toUpperCase();
    if (!indStatus && data.individual.customers && data.individual.customers[0]) {
      indStatus = String(data.individual.customers[0].status || '').toUpperCase();
    }
  }
  if (indStatus === 'SUSPENDED' || indStatus === 'TERMINATED') {
    stages.push({ name: 'Churn', cls: 'error' });
  }

  // Find stalled step label
  var stalledLabel = '';
  for (var i = 0; i < stages.length; i++) {
    if (stages[i].cls === 'current') { stalledLabel = stages[i].name + ' in progress'; break; }
    if (stages[i].cls === 'error' && stages[i].name !== 'Churn') { stalledLabel = stages[i].name + ' failed'; break; }
  }
  if (indStatus === 'SUSPENDED') stalledLabel = 'Account suspended';
  else if (indStatus === 'TERMINATED') stalledLabel = 'Account terminated';
  if (!stalledLabel && stages.length > 0 && stages[stages.length - 1].cls === 'completed') stalledLabel = 'All steps complete';

  var html = '<div class="funnel">';
  for (var i = 0; i < stages.length; i++) {
    html += '<div class="funnel-step ' + stages[i].cls + '">' + stages[i].name + '</div>';
  }
  html += '</div>';
  if (stalledLabel) html += '<div class="funnel-label">' + escapeHtml(stalledLabel) + '</div>';
  return html;
}

// ══════════════════════════════════════════════════════════════
// TAB 2: CONTEXT — restructured to lead with what matters
// ══════════════════════════════════════════════════════════════
function renderCustomerContext(data, container) {
  var c = data.customer;
  var order = data.orders && data.orders[0];
  var boss = extractFromBossApi(data);
  var msisdn = boss.msisdn || c.phone;
  var isPortIn = data.orders && data.orders.some(function(o) {
    return o.selectNumberType === 'PORTIN' || (o.portinResponse && o.portinResponse.indexOf('PortInMSISDN') !== -1);
  });

  var html = '';

  // 1. Mochi Summary (info collected from user)
  if (data.mochi && data.mochi.length > 0) {
    var m = data.mochi[0];
    html += '<div class="ctx-section"><h4>MOCHI — COLLECTED INFO</h4>';
    html += ctxRow('Issue Reported', escapeHtml(m.title || '—'));
    if (m.lastMessagePreview) {
      html += ctxRow('Last Message', escapeHtml(m.lastMessagePreview));
    }
    if (m.deviceInfo) {
      html += ctxRow('Device Info', escapeHtml(m.deviceInfo));
    }
    if (m.errorMessage) {
      html += ctxRow('Error Message', escapeHtml(m.errorMessage));
    }
    html += '</div>';
  }

  // 3. Funnel Stage (prominent)
  html += '<div class="ctx-section"><h4>ACCOUNT STAGE</h4>';
  html += renderFunnel(data);
  html += '</div>';

  // 4. Customer (compact card)
  html += '<div class="customer-card">';
  var cohortVal = c.cohort || 'Regular';
  var cohortBadge;
  if (cohortVal === 'S100') cohortBadge = '<span class="badge badge-blue">S100</span>';
  else if (cohortVal === 'FDT') cohortBadge = '<span class="badge badge-amber">FDT</span>';
  else cohortBadge = '<span class="badge badge-gray">Regular</span>';
  html += '<div class="cc-name">' + escapeHtml(c.name || '—') + ' ' + cohortBadge + '</div>';
  html += '<div class="cc-row"><span>' + escapeHtml(c.email || '—') + '</span></div>';
  html += '<div class="cc-row"><span>' + escapeHtml(c.phone || '—') + '</span><span>Since ' + fmtDate(order ? order.createdAt : null) + '</span></div>';
  html += '</div>';

  // 5. Line & SIM
  html += '<div class="ctx-section"><h4>LINE & SIM</h4>';
  html += ctxRow('Mobile #', msisdn ? escapeHtml(msisdn) : '—');
  html += ctxRow('# Status', boss.numberStatus ? statusBadge(boss.numberStatus) : '<span class="badge badge-gray">—</span>');
  if (isPortIn) {
    var portVal;
    if (data.portStatus) {
      portVal = statusBadge(data.portStatus.status || data.portStatus.portStatus || 'See raw data');
    } else {
      portVal = '<span class="badge badge-gray">N/A</span>';
    }
    html += ctxRow('Port-in', portVal);
  }
  var esimProfileStatus = data.esimProfile ? data.esimProfile.status : null;
  html += ctxRow('eSIM Status', esimProfileStatus ? statusBadge(esimProfileStatus) : (boss.simStatus ? statusBadge(boss.simStatus) : '<span class="badge badge-gray">—</span>'));
  html += ctxRow('Device', boss.deviceInfo ? escapeHtml(boss.deviceInfo) : (boss.imei ? escapeHtml(boss.imei) : '—'));
  if (boss.iccid) {
    html += ctxRow('ICCID', escapeHtml(boss.iccid), true);
  }
  html += '</div>';

  // 6. Order (collapsible, collapsed if completed)
  if (order) {
    var orderDone = order.status && ['completed','done'].indexOf(order.status.toLowerCase()) !== -1;
    html += '<div class="ctx-section"><details' + (orderDone ? '' : ' open') + '>';
    html += '<summary class="section-heading">ORDER ' + statusBadge(order.status) + '</summary>';
    html += '<div style="margin-top:8px;">';
    html += ctxRow('Order ID', '<span class="mono">' + escapeHtml(order.orderId || '—') + '</span>');
    var paid = order.paymentCompleted || boss.hasActiveProducts;
    html += ctxRow('Payment', paid ? statusBadge('Done') : statusBadge('Pending'));
    html += ctxRow('Created', fmtDate(order.createdAt));
    if (data.orders.length > 1) {
      html += ctxRow('Total Orders', '<span class="badge badge-blue">' + data.orders.length + '</span>');
    }
    html += '</div></details></div>';
  }

  // 6b. Issue Info — triage intake fields (L1+ only, not for L0 customer-facing agents)
  if (briefData && briefData.draftType !== 'customer' && briefData.incidentIntake && briefData.incidentIntake.fields) {
    var intake = briefData.incidentIntake;
    var ALREADY_DISPLAYED = {
      'ICCID': true, 'New SIM ICCID': true, 'Active SIM ICCID': true,
      'IMEI': true, 'MSISDN': true, 'SIM Type': true, 'Device Make/Model': true
    };
    var filteredFields = [];
    for (var fi = 0; fi < intake.fields.length; fi++) {
      if (!ALREADY_DISPLAYED[intake.fields[fi].field]) {
        filteredFields.push(intake.fields[fi]);
      }
    }
    if (filteredFields.length > 0) {
      var needsInput = [];
      var autoFilled = [];
      for (var fi = 0; fi < filteredFields.length; fi++) {
        if (filteredFields[fi].source === 'api' && filteredFields[fi].value) {
          autoFilled.push(filteredFields[fi]);
        } else {
          needsInput.push(filteredFields[fi]);
        }
      }
      var filledCount = autoFilled.length;
      var totalFields = filteredFields.length;
      var pct = Math.round((filledCount / totalFields) * 100);
      var toggleId = 'issue-info-auto-' + Date.now();

      html += '<div class="issue-info-card">';
      html += '<div class="issue-info-header">';
      html += '<span class="section-label">ISSUE INFO — ' + escapeHtml(intake.templateType) + '</span>';
      html += '<div class="ts-progress">';
      html += '<div class="ts-progress-bar"><div class="ts-progress-fill" style="width:' + pct + '%;"></div></div>';
      html += '<span class="ts-progress-label">' + filledCount + '/' + totalFields + '</span>';
      html += '</div></div>';

      // Needs-input fields (prominent)
      for (var ni = 0; ni < needsInput.length; ni++) {
        var f = needsInput[ni];
        html += '<div class="issue-info-item needs-input">';
        html += '<div class="issue-info-icon">!</div>';
        html += '<div class="issue-info-body">';
        html += '<div class="issue-info-label">' + escapeHtml(f.field) + '</div>';
        html += '<div class="issue-info-val">Needs agent input</div>';
        html += '</div></div>';
      }

      // Auto-filled fields (collapsed)
      if (autoFilled.length > 0) {
        html += '<details class="issue-info-toggle"><summary>\u25B8 Auto-filled (' + autoFilled.length + ')</summary>';
        for (var ai = 0; ai < autoFilled.length; ai++) {
          var af = autoFilled[ai];
          html += '<div class="issue-info-item auto-filled">';
          html += '<div class="issue-info-icon">\u2713</div>';
          html += '<div class="issue-info-body">';
          html += '<div class="issue-info-label">' + escapeHtml(af.field) + '</div>';
          html += '<div class="issue-info-val">' + escapeHtml(String(af.value)) + '</div>';
          html += '</div></div>';
        }
        html += '</details>';
      }

      html += '</div>';
    }
  }

  // 7. Journey Friction — repeated CJ action events indicating retries/failures
  var retries = data.journeyRetries || [];
  // Filter out passive view/status events — only keep actual actions
  var viewPattern = /(_view$|_viewed$|_screen$|_page$|_opened$|_started$|_loaded$|_displayed$|_status$|_check$|^tutorial|^af_mochi$|^mochi$)/i;
  var actionRetries = [];
  for (var ri = 0; ri < retries.length; ri++) {
    var evName = retries[ri].event || '';
    if (!viewPattern.test(evName)) actionRetries.push(retries[ri]);
  }
  if (actionRetries.length > 0) {
    // Categorize events into meaningful groups
    var frictionCategories = {
      Payment: { pattern: /payment|pay|charge|checkout|stripe|billing/i, items: [], icon: '\uD83D\uDCB3' },
      'Port-in': { pattern: /port|number_transfer|ntp|porting/i, items: [], icon: '\uD83D\uDD04' },
      'eSIM Activation': { pattern: /esim|e_sim|activation|provision|qr|download_profile/i, items: [], icon: '\uD83D\uDCF1' },
      'Airvet / Pet Insurance': { pattern: /airvet|pet|vet|insurance/i, items: [], icon: '\uD83D\uDC3E' },
      'Plan Selection': { pattern: /plan|select_plan|pricing|subscription/i, items: [], icon: '\uD83D\uDCCB' },
      'Number Selection': { pattern: /number_selection|select_number|choose_number|msisdn/i, items: [], icon: '#\uFE0F\u20E3' },
      'IMEI / Device': { pattern: /imei|device|compatibility|check_device/i, items: [], icon: '\uD83D\uDD0D' },
      'Login / Auth': { pattern: /login|auth|sign_in|otp|verify_email|register/i, items: [], icon: '\uD83D\uDD10' },
      Other: { pattern: null, items: [], icon: '\u26A0' }
    };

    for (var ri = 0; ri < actionRetries.length; ri++) {
      var ev = actionRetries[ri];
      var evName = ev.event || '';
      var matched = false;
      for (var cat in frictionCategories) {
        if (cat === 'Other') continue;
        if (frictionCategories[cat].pattern && frictionCategories[cat].pattern.test(evName)) {
          frictionCategories[cat].items.push(ev);
          matched = true;
          break;
        }
      }
      if (!matched) frictionCategories['Other'].items.push(ev);
    }

    html += '<div class="ctx-section"><h4>JOURNEY FRICTION</h4>';
    html += '<div style="font-size:12px;line-height:1.6;">';
    for (var cat in frictionCategories) {
      var fc = frictionCategories[cat];
      if (fc.items.length === 0) continue;
      // Sum total attempts for this category
      var totalAttempts = 0;
      var eventNames = [];
      for (var fi = 0; fi < fc.items.length; fi++) {
        totalAttempts += parseInt(fc.items[fi].attempts) || 0;
        var rawName = (fc.items[fi].event || '').replace(/^af_/, '').replace(/_/g, ' ');
        eventNames.push(rawName + ' (' + fc.items[fi].attempts + 'x)');
      }
      var sevClass = totalAttempts >= 5 ? 'sev-high' : totalAttempts >= 3 ? 'sev-med' : 'sev-low';
      html += '<div class="friction-row">';
      html += '<div class="friction-header">';
      html += '<span style="font-size:13px;">' + fc.icon + '</span>';
      html += '<span class="friction-category">' + escapeHtml(cat) + '</span>';
      html += '<span class="' + sevClass + '">' + totalAttempts + ' attempts</span>';
      html += '</div>';
      html += '<div class="friction-detail">' + escapeHtml(eventNames.join(', ')) + '</div>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  // 8. Comms Timeline — deduplicated, from correspondenceSummaries + Braze
  var commsEntries = [];
  var corr = (briefData && briefData.correspondenceSummaries) ? briefData.correspondenceSummaries : [];
  for (var ci = 0; ci < corr.length; ci++) {
    var c = corr[ci];
    var chLabel = c.channel === 'mochi' ? 'Mochi' : c.channel === 'mochi_escalation' ? 'Mochi → Ticket' : 'Ticket';
    commsEntries.push({
      date: c.date || c.updatedAt,
      channel: chLabel,
      topic: c.summary || 'General inquiry',
      outcome: c.outcome || c.status || '',
      messageCount: c.messageCount || null,
      ticketId: c.ticketId,
      status: c.status,
    });
  }
  // Braze marketing emails (separate channel, no dedup needed)
  var brazeList = data.brazeEmails || [];
  for (var bi = 0; bi < brazeList.length; bi++) {
    commsEntries.push({
      date: brazeList[bi].sent_at,
      channel: 'Marketing',
      topic: brazeList[bi].campaign_name || 'Email campaign',
      outcome: 'Sent',
      messageCount: null,
      ticketId: null,
      status: null,
    });
  }
  commsEntries.sort(function(a, b) {
    var da = a.date ? new Date(a.date).getTime() : 0;
    var db = b.date ? new Date(b.date).getTime() : 0;
    return db - da;
  });

  if (commsEntries.length > 0) {
    html += '<div class="ctx-section"><h4>COMMS TIMELINE</h4>';
    var channelColors = { 'Ticket': 'var(--blue)', 'Mochi': 'var(--indigo)', 'Mochi → Ticket': 'var(--indigo)', 'Marketing': 'var(--dark-amber)' };
    var outcomeColors = {
      'Resolved': 'var(--green)', 'Resolved by bot': 'var(--green)',
      'Waiting on customer': 'var(--dark-amber)', 'Escalated to agent': 'var(--dark-amber)',
      'Open': 'var(--blue)', 'On hold': 'var(--text-meta)', 'Sent': 'var(--text-meta)',
    };
    for (var ti = 0; ti < Math.min(commsEntries.length, 10); ti++) {
      var entry = commsEntries[ti];
      var dateStr = entry.date ? fmtDate(entry.date) : '—';
      var chColor = channelColors[entry.channel] || 'var(--text-secondary)';
      // Determine outcome color — check for prefix match for resolution hints
      var ocColor = outcomeColors[entry.outcome] || 'var(--text-secondary)';
      if (entry.status === 'solved' || entry.status === 'closed') ocColor = 'var(--green)';
      else if (entry.status === 'pending') ocColor = 'var(--dark-amber)';

      html += '<div class="comms-row">';
      // Row 1: date + channel + topic
      html += '<div class="comms-header">';
      html += '<span class="comms-date">' + escapeHtml(dateStr) + '</span>';
      html += '<span style="font-size:10px;font-weight:600;color:' + chColor + ';min-width:55px;flex-shrink:0;">' + escapeHtml(entry.channel) + '</span>';
      html += '<span class="comms-topic">' + escapeHtml(entry.topic) + '</span>';
      html += '</div>';
      // Row 2: outcome + message count
      var metaLine = entry.outcome || '';
      if (entry.messageCount && entry.messageCount > 1) {
        metaLine += (metaLine ? ' · ' : '') + entry.messageCount + ' msgs';
      }
      if (entry.ticketId) {
        metaLine += (metaLine ? ' · ' : '') + '#' + entry.ticketId;
      }
      if (metaLine) {
        html += '<div style="font-size:11px;color:' + ocColor + ';margin-top:1px;padding-left:133px;" class="comms-meta">' + escapeHtml(metaLine) + '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }

  container.innerHTML = html;
}

// ── Diagnostic Checklist Builder ─────────────────────────────
// Reads lookupData to auto-check verifiable items with real values.
// Returns array of { label, value, status: 'checked'|'error'|'pending' }
function buildDiagnosticChecklist() {
  var checks = [];
  if (!lookupData) return checks;

  var order = lookupData.orders && lookupData.orders[0];
  var boss = extractFromBossApi(lookupData);
  var esim = lookupData.esimProfile;
  var airvet = lookupData.airvet;
  var portStatus = lookupData.portStatus;
  var mochi = lookupData.mochi;

  // 1. Account / Order
  if (order) {
    var orderStatus = (order.status || '').toLowerCase();
    if (['completed', 'done'].indexOf(orderStatus) !== -1) {
      checks.push({ label: 'Order', value: 'Completed — ' + escapeHtml(order.orderId || ''), status: 'checked' });
    } else if (orderStatus === 'failed' || orderStatus === 'cancelled') {
      checks.push({ label: 'Order', value: escapeHtml(order.status) + ' — ' + escapeHtml(order.orderId || ''), status: 'error' });
    } else if (order.orderId) {
      checks.push({ label: 'Order', value: escapeHtml(order.status || 'In progress') + ' — ' + escapeHtml(order.orderId), status: 'checked' });
    }
  } else {
    checks.push({ label: 'Order', value: 'No order found', status: 'pending' });
  }

  // 2. Payment
  var paymentDone = !!(order && order.paymentCompleted) || boss.hasActiveProducts;
  if (paymentDone) {
    checks.push({ label: 'Payment', value: 'Completed', status: 'checked' });
  } else if (order && order.status && order.status.toUpperCase() === 'FAILED') {
    checks.push({ label: 'Payment', value: 'Failed', status: 'error' });
  } else if (order) {
    checks.push({ label: 'Payment', value: 'Pending', status: 'pending' });
  }

  // 3. Number assignment
  if (boss.msisdn) {
    checks.push({ label: 'Number assigned', value: escapeHtml(boss.msisdn), status: 'checked' });
  } else {
    checks.push({ label: 'Number assigned', value: 'Not yet assigned', status: 'pending' });
  }

  // 4. Port-in (only if applicable)
  var isPortIn = lookupData.orders && lookupData.orders.some(function(o) {
    return o.selectNumberType === 'PORTIN' || (o.portinResponse && o.portinResponse.indexOf('PortInMSISDN') !== -1);
  });
  if (isPortIn) {
    if (portStatus) {
      var ps = (portStatus.status || portStatus.portStatus || '').toUpperCase();
      if (['COMPLETED', 'DONE', 'RELEASED'].indexOf(ps) !== -1) {
        checks.push({ label: 'Port-in', value: 'Completed', status: 'checked' });
      } else if (['FAILED', 'REJECTED', 'CANCELLED'].indexOf(ps) !== -1) {
        checks.push({ label: 'Port-in', value: escapeHtml(portStatus.status || portStatus.portStatus), status: 'error' });
      } else {
        checks.push({ label: 'Port-in', value: escapeHtml(portStatus.status || portStatus.portStatus || 'In progress'), status: 'pending' });
      }
    } else {
      checks.push({ label: 'Port-in', value: 'Status unknown', status: 'pending' });
    }
  }

  // 5. eSIM profile
  if (esim) {
    var esimStatus = (esim.status || '').toUpperCase();
    if (['INSTALLED', 'ENABLED'].indexOf(esimStatus) !== -1) {
      checks.push({ label: 'eSIM profile', value: escapeHtml(esim.status), status: 'checked' });
    } else if (['ERROR', 'FAILED'].indexOf(esimStatus) !== -1) {
      checks.push({ label: 'eSIM profile', value: escapeHtml(esim.status), status: 'error' });
    } else {
      checks.push({ label: 'eSIM profile', value: escapeHtml(esim.status || 'Provisioning'), status: 'pending' });
    }
  } else if (boss.iccid) {
    checks.push({ label: 'eSIM profile', value: 'ICCID assigned — awaiting install', status: 'pending' });
  } else {
    checks.push({ label: 'eSIM profile', value: 'Not provisioned', status: 'pending' });
  }

  // 6. IMEI (device)
  if (boss.imei) {
    checks.push({ label: 'Device IMEI', value: '<span class="mono">' + escapeHtml(boss.imei) + '</span>', status: 'checked' });
  } else {
    checks.push({ label: 'Device IMEI', value: 'Not on file — ask customer', status: 'pending' });
  }

  // 7. ICCID
  if (boss.iccid) {
    checks.push({ label: 'ICCID', value: '<span class="mono">' + escapeHtml(boss.iccid) + '</span>', status: 'checked' });
  }

  // 8. Airvet activation
  if (airvet && airvet.activated) {
    checks.push({ label: 'Airvet', value: 'Activated' + (airvet.activatedAt ? ' — ' + fmtDate(airvet.activatedAt) : ''), status: 'checked' });
  } else {
    checks.push({ label: 'Airvet', value: 'Not activated', status: 'pending' });
  }

  // 9. Mochi bot interaction
  if (mochi && mochi.length > 0) {
    var m = mochi[0];
    var mLabel = escapeHtml(m.category || m.title || 'Support');
    var mEsc = m.escalated === 'true' ? ' (escalated)' : '';
    checks.push({ label: 'Mochi chat', value: mLabel + mEsc + ' — ' + fmtDate(m.created_at), status: 'checked' });
  }

  return checks;
}

// Renders diagnostic checklist HTML from a checks array
function renderDiagnosticChecklistHtml(checks) {
  if (!checks || checks.length === 0) return '';

  var doneCount = 0;
  for (var i = 0; i < checks.length; i++) {
    if (checks[i].status === 'checked') doneCount++;
  }
  var total = checks.length;
  var pct = Math.round((doneCount / total) * 100);

  var html = '<div class="ts-card">';
  html += '<div class="ts-header">';
  html += '<span class="section-label">System Checks</span>';
  html += '<div class="ts-progress">';
  html += '<div class="ts-progress-bar"><div class="ts-progress-fill" style="width:' + pct + '%;"></div></div>';
  html += '<span class="ts-progress-label">' + doneCount + '/' + total + '</span>';
  html += '</div></div>';

  for (var i = 0; i < checks.length; i++) {
    var c = checks[i];
    var cls = c.status === 'checked' ? 'checked' : (c.status === 'error' ? 'error' : 'pending');
    var checkIcon = c.status === 'checked' ? '\u2713' : (c.status === 'error' ? '\u2717' : '');
    html += '<div class="diag-item ' + cls + '">';
    html += '<div class="diag-check">' + checkIcon + '</div>';
    html += '<div class="diag-body">';
    html += '<div class="diag-label">' + escapeHtml(c.label) + '</div>';
    html += '<div class="diag-value">' + c.value + '</div>';
    html += '</div></div>';
  }

  html += '</div>';
  return html;
}

// ══════════════════════════════════════════════════════════════
// TAB 1: AGENT BRIEF — redesigned triage layout
// Who → What's wrong → How bad → What to do → What to say
// ══════════════════════════════════════════════════════════════
function renderAgentBrief(data, container) {
  var html = '';
  var draftId = 'email-draft-' + Date.now();
  var urgencyId = 'urgency-' + Date.now();

  // Pull customer info from lookupData (global) if available
  var customerName = '—';
  var orderStatus = null;
  if (lookupData && lookupData.customer) {
    customerName = lookupData.customer.name || '—';
  }
  if (lookupData && lookupData.orders && lookupData.orders.length > 0) {
    orderStatus = lookupData.orders[0].status;
  }

  // ─── 1. HERO CARD (who + what's wrong + confidence) ──────
  var confidence = (data.currentProblem && data.currentProblem.confidence) || 'low';
  html += '<div class="hero-card confidence-' + confidence + '">';
  html += '<div class="hc-top">';
  html += '<span class="hc-name">' + escapeHtml(customerName);
  // LOB badge inline
  if (currentLob) {
    html += ' <span class="hc-lob-badge">' + (currentLob.icon || '') + ' ' + escapeHtml(currentLob.shortName || currentLob.displayName || '') + '</span>';
  }
  html += '</span>';
  // Cohort badge
  var cohortLabel = '';
  if (lookupData && lookupData.customer) cohortLabel = lookupData.customer.cohort || '';
  if (cohortLabel) {
    var cohortCls = cohortLabel === 'S100' ? 'badge-purple' : cohortLabel === 'FDT' ? 'badge-amber' : 'badge-gray';
    html += '<span class="badge ' + cohortCls + '">' + escapeHtml(cohortLabel) + '</span>';
  } else if (orderStatus) {
    html += statusBadge(orderStatus);
  }
  html += '</div>';
  if (data.currentProblem) {
    html += '<div class="hc-problem">' + escapeHtml(data.currentProblem.problem) + '</div>';
    html += '<div class="hc-meta">';
    html += '<span class="hc-confidence"><span class="hc-dot"></span> ' + confidence.charAt(0).toUpperCase() + confidence.slice(1) + ' confidence</span>';
    html += '<span class="hc-source">AI</span>';
    html += '</div>';
  } else {
    html += '<div class="hc-no-problem">No issue detected — review conversation</div>';
  }
  html += '</div>';

  // ─── 2. URGENCY STRIP (how bad — contact history) ────────
  html += buildUrgencyStrip(data.previousContacts, urgencyId);

  // ─── 3. NEXT STEPS ──────────────────────────────────────
  if (data.nextSteps && data.nextSteps.length > 0) {
    var primaryStep = null;
    var doneSteps = [];
    var remainingSteps = [];

    for (var i = 0; i < data.nextSteps.length; i++) {
      var step = data.nextSteps[i];
      if (step.type === 'ai_done') {
        doneSteps.push(step);
      } else if (!primaryStep) {
        primaryStep = step;
      } else {
        remainingSteps.push(step);
      }
    }

    // Primary action card OR "all done" card
    if (primaryStep) {
      var iconChar = getStepIcon(primaryStep.type);
      html += '<div class="action-card">';
      html += '<div class="ac-header">';
      html += '<div class="ac-icon type-' + escapeHtml(primaryStep.type) + '">' + iconChar + '</div>';
      html += '<div class="ac-text">';
      if (primaryStep.url) {
        html += '<a href="' + escapeHtml(primaryStep.url) + '" target="_blank" class="link-inherit">' + escapeHtml(primaryStep.text) + '</a>';
      } else {
        html += escapeHtml(primaryStep.text);
      }
      html += '</div>';
      html += '</div>';
      if (primaryStep.result) {
        html += '<div class="ac-result">' + escapeHtml(primaryStep.result) + '</div>';
      }
      if (primaryStep.source) {
        html += '<div class="step-source">Source: ' + escapeHtml(primaryStep.source) + '</div>';
      }
      html += '</div>';
    } else if (doneSteps.length > 0) {
      html += '<div class="action-card action-done">';
      html += '<div class="ac-header">';
      html += '<div class="ac-icon type-ai_done">\u2713</div>';
      html += '<div class="ac-text">No further action needed</div>';
      html += '</div>';
      html += '<div class="ac-result">' + doneSteps.length + ' step' + (doneSteps.length > 1 ? 's' : '') + ' completed by Zara</div>';
      html += '</div>';
    }

    // Remaining steps (collapsed by default)
    if (remainingSteps.length > 0) {
      var remId = 'rem-' + Date.now();
      html += '<button class="completed-toggle" onclick="toggleCompletedSteps(\'' + remId + '\', this)">' + remainingSteps.length + ' more step' + (remainingSteps.length > 1 ? 's' : '') + '</button>';
      html += '<div class="completed-steps" id="' + remId + '">';
      for (var i = 0; i < remainingSteps.length; i++) {
        var rs = remainingSteps[i];
        var rsIcon = getStepIcon(rs.type);
        html += '<div class="rs-item">';
        html += '<div class="rs-icon type-' + escapeHtml(rs.type) + '">' + rsIcon + '</div>';
        html += '<div class="rs-text">';
        if (rs.url) {
          html += '<a href="' + escapeHtml(rs.url) + '" target="_blank">' + escapeHtml(rs.text) + '</a>';
        } else {
          html += escapeHtml(rs.text);
        }
        if (rs.source) {
          html += '<div class="step-source">Source: ' + escapeHtml(rs.source) + '</div>';
        }
        html += '</div></div>';
      }
      html += '</div>';
    }

    // Done steps (collapsed)
    if (doneSteps.length > 0) {
      var doneId = 'done-' + Date.now();
      html += '<button class="completed-toggle" onclick="toggleCompletedSteps(\'' + doneId + '\', this)">' + doneSteps.length + ' completed</button>';
      html += '<div class="completed-steps" id="' + doneId + '">';
      for (var i = 0; i < doneSteps.length; i++) {
        var ds = doneSteps[i];
        html += '<div class="rs-item">';
        html += '<div class="rs-icon type-ai_done">✓</div>';
        html += '<div class="rs-text rs-done">' + escapeHtml(ds.text);
        if (ds.result) html += '<div class="step-result">' + escapeHtml(ds.result) + '</div>';
        if (ds.source) html += '<div class="step-source">Source: ' + escapeHtml(ds.source) + '</div>';
        html += '</div></div>';
      }
      html += '</div>';
    }
  }

  // ─── 3b. DIAGNOSTIC SEQUENCE (system checks visualization) ──
  var diagChecks = buildDiagnosticChecklist();
  if (diagChecks && diagChecks.length > 0) {
    var diagDone = 0;
    for (var di = 0; di < diagChecks.length; di++) {
      if (diagChecks[di].status === 'checked') diagDone++;
    }
    html += '<div class="diag-sequence">';
    html += '<div class="diag-header">Diagnostic Sequence <span class="diag-progress">' + diagDone + '/' + diagChecks.length + '</span></div>';
    for (var di = 0; di < diagChecks.length; di++) {
      var dc = diagChecks[di];
      var stepStatus = dc.status === 'checked' ? 'completed' : (dc.status === 'error' ? 'skipped' : 'locked');
      // First non-completed step is "current"
      if (dc.status !== 'checked' && dc.status !== 'error') {
        var hasPriorCurrent = false;
        for (var dj = 0; dj < di; dj++) {
          if (diagChecks[dj].status !== 'checked' && diagChecks[dj].status !== 'error') { hasPriorCurrent = true; break; }
        }
        if (!hasPriorCurrent) stepStatus = 'current';
      }
      var numIcon = stepStatus === 'completed' ? '\u2713' : (di + 1);
      html += '<div class="diag-step step-' + stepStatus + '">';
      html += '<div class="diag-num">' + numIcon + '</div>';
      html += '<div><div class="diag-label">' + escapeHtml(dc.label) + '</div>';
      html += '<div class="diag-desc">' + dc.value + '</div></div>';
      html += '</div>';
    }
    html += '</div>';
  }

  // ─── 3c. CTA GRID (agent actions) ─────────────────────────
  if (data.ctaActions && data.ctaActions.length > 0) {
    html += '<div class="cta-section">';
    html += '<div class="cta-section-label">Agent Actions</div>';
    html += '<div class="cta-grid">';
    for (var ci = 0; ci < data.ctaActions.length; ci++) {
      var cta = data.ctaActions[ci];
      var ctaDone = cta.done || cta.executed;
      html += '<button class="cta-btn' + (ctaDone ? ' cta-done' : '') + '" ' +
        (ctaDone ? '' : 'onclick="executeCTA(\'' + escapeHtml(cta.type || cta.id) + '\', this)"') + '>';
      html += (cta.icon || '\u26A1') + ' ' + escapeHtml(cta.label);
      if (ctaDone) html += '<span class="cta-status">\u2713</span>';
      html += '</button>';
    }
    html += '</div>';
    // Render result cards for completed CTAs
    for (var ci = 0; ci < data.ctaActions.length; ci++) {
      var cta = data.ctaActions[ci];
      if ((cta.done || cta.executed) && cta.result) {
        var r = cta.result;
        html += '<div class="cta-result"><div class="cr-title">' + escapeHtml(r.title || cta.label) + '</div>';
        if (r.rows) {
          for (var ri = 0; ri < r.rows.length; ri++) {
            var row = r.rows[ri];
            var valHtml = row[2] ? '<span class="badge ' + row[2] + '">' + escapeHtml(row[1]) + '</span>' : escapeHtml(row[1]);
            html += '<div class="cr-row"><span class="cr-label">' + escapeHtml(row[0]) + '</span><span class="cr-value">' + valHtml + '</span></div>';
          }
        }
        if (r.alert) {
          html += '<div class="cr-alert alert-' + (r.alert.type || 'amber') + '">' + escapeHtml(r.alert.text) + '</div>';
        }
        html += '</div>';
      }
    }
    html += '</div>';
  }

  // ─── 4. EMAIL DRAFT (conditional — only if draft exists) ──
  var draftObj = (data.customerState && data.customerState.suggestedResponse) || null;
  var draftText = '';
  var draftBasedOn = [];
  var draftVerify = [];
  if (draftObj) {
    if (typeof draftObj === 'string') {
      draftText = draftObj;  // backward compat
    } else {
      draftText = draftObj.text || '';
      draftBasedOn = draftObj.basedOn || [];
      draftVerify = draftObj.verify || [];
    }
  }
  if (!draftText && data.nextSteps) {
    for (var i = 0; i < data.nextSteps.length; i++) {
      if (data.nextSteps[i].emailDraft) { draftText = data.nextSteps[i].emailDraft; break; }
    }
  }
  if (draftText) {
    // Store original draft for feedback comparison
    window._draftOriginals = window._draftOriginals || {};
    window._draftOriginals[draftId] = draftText;

    // Status badge logic

    // ── Verification details (outside the draft card) ──
    if (hasFacts || hasFlags) {
      html += '<div class="draft-verification">';
      if (hasFacts) {
        html += '<div class="draft-facts">';
        for (var i = 0; i < draftBasedOn.length; i++) {

      }
      html += '</div>';
    }

    // ── 4b. ESCALATION PACKAGE (vendor tickets only) ──
    if (data.escalationPackage) {
      var esc = data.escalationPackage;
      var escId = 'esc-draft-' + Date.now();

      html += 'Escalation Package';
      html += '<span class="escalation-vendor-badge">' + escapeHtml(esc.vendorTeam) + '</span>';
      html += '</div>';

      if (esc.completeness < 100) {
        html += '<div class="esc-completeness">';
        html += '<span>' + esc.completeness + '% fields auto-filled</span>';
        html += '</div>';
      }

      if (esc.hasTriageAnalysis) {
        html += '<div class="esc-triage-badge">AI Triage Analysis</div>';
      }

      html += '<div class="draft-preview" id="' + escId + '-preview" onclick="toggleDraftExpand(\'' + escId + '\')">';
      html += escapeHtml(esc.text);
      html += '</div>';
      html += '<div class="draft-edit-area" id="' + escId + '-edit">';
      html += '<textarea id="' + escId + '-textarea">' + escapeHtml(esc.text) + '</textarea>';
      html += '</div>';

      html += '<div class="draft-actions" id="' + escId + '-actions">';
      html += '<button class="btn-edit" onclick="reviewDraft2(\'' + escId + '\')">Edit</button>';
      html += '<button class="btn-copy" onclick="copyDraft(\'' + escId + '\')">Copy</button>';
      html += '</div>';
      html += '</div>';
    }
  }

  container.innerHTML = html;
}

function buildContactSummary(contacts) {
  if (!contacts || contacts.length === 0) {
    return '<div class="first-contact-hint">First contact — no prior history</div>';
  }

  var total = contacts.length;
  var frustration = total <= 1 ? 'low' : (total <= 3 ? 'med' : 'high');
  var escalated = contacts.filter(function(c) { return c.escalated; }).length;
  var mochiCount = contacts.filter(function(c) { return c.channel === 'Mochi'; }).length;
  var ticketCount = contacts.filter(function(c) { return c.channel !== 'Mochi'; }).length;
  var openCount = contacts.filter(function(c) { return c.status === 'open' || c.status === 'new'; }).length;

  // Count label
  var countLabel = total + ' previous contact' + (total > 1 ? 's' : '');

  // Build summary sentences
  var parts = [];

  // Channel breakdown
  var channels = [];
  if (ticketCount > 0) channels.push(ticketCount + ' ticket' + (ticketCount > 1 ? 's' : ''));
  if (mochiCount > 0) channels.push(mochiCount + ' Mochi chat' + (mochiCount > 1 ? 's' : ''));
  if (channels.length > 0) parts.push(channels.join(', '));

  // Escalation signal
  if (escalated > 0) parts.push(escalated + ' escalated');

  // Open tickets
  if (openCount > 0) parts.push(openCount + ' still open');

  // Most recent contact reason
  var latest = contacts[0];
  var latestReason = latest.reason || 'support inquiry';
  var latestChannel = latest.channel || 'Email';
  var latestDate = fmtDateTime(latest.date);

  // Time span
  var oldest = contacts[contacts.length - 1];
  var spanText = '';
  if (oldest.date && latest.date) {
    var spanMs = new Date(latest.date).getTime() - new Date(oldest.date).getTime();
    var spanDays = Math.round(spanMs / 86400000);
    if (spanDays <= 1) spanText = 'all within the last day';
    else if (spanDays <= 7) spanText = 'over the past ' + spanDays + ' days';
    else spanText = 'over the past ' + Math.round(spanDays / 7) + ' week' + (spanDays > 13 ? 's' : '');
  }

  var html = '<div class="contact-summary frustration-' + frustration + '">';
  html += '<div class="cs-count"><span class="cs-dot"></span>' + escapeHtml(countLabel) + '</div>';
  html += '<div class="cs-body">';
  html += escapeHtml(parts.join(' \u00B7 '));
  if (spanText) html += ' \u00B7 ' + escapeHtml(spanText);
  html += '.<br>Last: ' + escapeHtml(latestChannel) + ' re: ' + escapeHtml(latestReason) + ' (' + escapeHtml(latestDate) + ')';
  html += '</div></div>';
  return html;
}

function buildUrgencyStrip(contacts, urgencyId) {
  if (!contacts || contacts.length === 0) {
    return '<div class="urgency-strip frustration-low" onclick="toggleUrgencyExpand(\'' + urgencyId + '\', this)">' +
      '<span class="us-dot"></span>First contact — no prior history' +
      '<span class="us-chevron">\u25BC</span></div>' +
      '<div class="urgency-contacts" id="' + urgencyId + '"></div>';
  }

  var total = contacts.length;
  var frustration = total <= 1 ? 'low' : (total <= 3 ? 'med' : 'high');
  var escalated = contacts.filter(function(c) { return c.escalated; }).length;

  // Time span
  var oldest = contacts[contacts.length - 1];
  var latest = contacts[0];
  var spanText = '';
  if (oldest.date && latest.date) {
    var spanMs = new Date(latest.date).getTime() - new Date(oldest.date).getTime();
    var spanDays = Math.round(spanMs / 86400000);
    if (spanDays <= 1) spanText = '';
    else if (spanDays <= 7) spanText = spanDays + ' days';
    else spanText = Math.round(spanDays / 7) + ' week' + (spanDays > 13 ? 's' : '');
  }

  // Build compact line
  var parts = [];
  var ordinal = total === 1 ? '2nd' : total === 2 ? '3rd' : (total + 1) + 'th';
  parts.push(ordinal + ' contact');
  if (escalated > 0) parts.push(escalated + ' escalated');
  if (spanText) parts.push(spanText);

  var html = '<div class="urgency-strip frustration-' + frustration + '" onclick="toggleUrgencyExpand(\'' + urgencyId + '\', this)">';
  html += '<span class="us-dot"></span>';
  html += escapeHtml(parts.join(' \u00B7 '));
  html += '<span class="us-chevron">\u25BC</span>';
  html += '</div>';

  // Expandable — condensed summary of previous correspondence
  var currentProblem = (briefData && briefData.currentProblem) ? briefData.currentProblem.problem : '';
  var corr = (briefData && briefData.correspondenceSummaries) ? briefData.correspondenceSummaries : [];
  var items = corr.length > 0 ? corr : contacts;

  // Tally resolved/open/escalated, collect unique topics, check relevance
  var resolvedCount = 0, openCount = 0, escalatedCount = 0, relatedCount = 0;
  var topicCounts = {}; // topic → count
  var currentLower = currentProblem ? currentProblem.toLowerCase() : '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var isResolved = item.status === 'solved' || item.status === 'closed' || item.status === 'resolved';
    if (isResolved) resolvedCount++; else openCount++;
    if (item.escalated || item.status === 'escalated') escalatedCount++;

    var topic = item.summary || item.reason || 'General inquiry';
    topicCounts[topic] = (topicCounts[topic] || 0) + 1;

    // Relevance: check if topic keywords overlap with current problem
    if (currentLower && topic !== 'General inquiry') {
      var topicWords = topic.toLowerCase().replace(/[\/\-]/g, ' ').split(/\s+/);
      for (var tw = 0; tw < topicWords.length; tw++) {
        if (topicWords[tw].length > 3 && currentLower.indexOf(topicWords[tw]) !== -1) {
          relatedCount++; break;
        }
      }
    }
  }

  // Build topic list sorted by frequency, max 3
  var topicList = [];
  for (var t in topicCounts) { topicList.push({ name: t, count: topicCounts[t] }); }
  topicList.sort(function(a, b) { return b.count - a.count; });

  html += '<div class="urgency-contacts" id="' + urgencyId + '">';
  html += '<div class="urgency-detail">';

  // 1-3 sentence summary
  var summaryParts = [];
  var topicLabels = [];
  for (var ti = 0; ti < Math.min(topicList.length, 3); ti++) {
    var tl = topicList[ti];
    topicLabels.push(tl.name + (tl.count > 1 ? ' (' + tl.count + 'x)' : ''));
  }
  summaryParts.push('Previous contacts: ' + topicLabels.join(', ') + '.');
  if (escalatedCount > 0) {
    summaryParts.push(escalatedCount + ' of ' + total + ' required escalation.');
  }

  html += '<div style="margin-bottom:6px;">' + escapeHtml(summaryParts.join(' ')) + '</div>';

  // Tags row
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
  if (resolvedCount > 0) {
    html += statusBadge(resolvedCount === total ? 'All resolved' : resolvedCount + '/' + total + ' resolved');
  }
  if (openCount > 0) {
    html += statusBadge(openCount + ' open');
  }
  if (relatedCount > 0) {
    html += '<span class="badge badge-amber" style="font-size:10px;">' + relatedCount + ' related to current issue</span>';
  } else {
    html += '<span class="badge badge-blue" style="font-size:10px;">No prior contacts match current issue</span>';
  }
  html += '</div>';

  html += '</div></div>';

  return html;
}

var _slaInterval = null;
var _slaMetrics = null;

function slaFormatDuration(ms) {
  var abs = Math.abs(ms);
  var totalSec = Math.floor(abs / 1000);
  var d = Math.floor(totalSec / 86400);
  var h = Math.floor((totalSec % 86400) / 3600);
  var m = Math.floor((totalSec % 3600) / 60);
  var s = totalSec % 60;
  if (d > 0) return d + 'd ' + h + 'h ' + m + 'm';
  if (h > 0) return h + 'h ' + m + 'm ' + s + 's';
  return m + 'm ' + s + 's';
}

function slaPct(elapsedMs, targetMs) {
  if (targetMs <= 0) return 100;
  return Math.min((elapsedMs / targetMs) * 100, 100);
}

function slaStatus(elapsedMs, targetMs) {
  var p = slaPct(elapsedMs, targetMs);
  if (elapsedMs >= targetMs) return 'breached';
  if (p > 85) return 'red';
  if (p > 60) return 'amber';
  return 'green';
}

async function loadSla(email) {
  var container = document.getElementById('sla-data');
  container.innerHTML = '<div class="ctx-placeholder">Loading SLA data...</div>';

  try {
    var resp = await zaraFetch(serverUrl + '/api/sla', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email }),
    });
    var data = await resp.json();

    if (data.error) {
      container.innerHTML = '<div class="ctx-placeholder">' + escapeHtml(data.error) + '</div>';
      return;
    }
    if (!data.found) {
      container.innerHTML = '<div class="ctx-placeholder">No active tickets found for SLA tracking.</div>';
      return;
    }

    _slaMetrics = data.metrics;
    renderSlaMetrics(container, data);
    startSlaCountdown(container);
  } catch (err) {
    container.innerHTML = '<div class="ctx-placeholder">Failed to load SLA data.</div>';
  }
}

function renderSlaMetrics(container, data) {
  var metrics = data.metrics;
  var html = '';

  // Path + severity + status badges
  var pathClass = 'sla-badge-blue';
  if (data.path && data.path.indexOf('Partner') === 0) pathClass = 'sla-badge-purple';
  else if (data.path && data.path.indexOf('Escalated') === 0) pathClass = 'sla-badge-orange';

  // Severity badge color
  var sevClass = 'sla-badge-gray';
  if (data.severity === 's1') sevClass = 'sla-badge-red';
  else if (data.severity === 's2') sevClass = 'sla-badge-amber';

  // Ticket status badge
  var statusMap = { open: 'sla-badge-red', pending: 'sla-badge-yellow', hold: 'sla-badge-amber', new: 'sla-badge-blue', solved: 'sla-badge-green', closed: 'sla-badge-green' };
  var statusClass = statusMap[data.ticketStatus] || 'sla-badge-gray';

  html += '<div class="sla-meta">';
  html += '<span class="sla-badge ' + pathClass + '">' + escapeHtml(data.path || 'L0 Direct') + '</span>';
  html += '<span class="sla-badge ' + sevClass + '">' + escapeHtml(data.severityLabel || (data.priority || 'normal').toUpperCase()) + '</span>';
  html += '<span class="sla-badge ' + statusClass + '">' + escapeHtml((data.ticketStatus || 'open').toUpperCase()) + '</span>';
  html += '<span class="sla-badge sla-badge-gray">#' + escapeHtml(String(data.ticketId || '')) + '</span>';
  html += '</div>';

  // Ticket subject
  if (data.ticketSubject) {
    html += '<div class="sla-ticket-subject" title="' + escapeHtml(data.ticketSubject) + '">' + escapeHtml(data.ticketSubject) + '</div>';
  }

  // Ticket age
  if (data.ticketCreatedAt) {
    var ageMs = Date.now() - new Date(data.ticketCreatedAt).getTime();
    var ageDays = Math.floor(ageMs / 86400000);
    var ageHours = Math.floor((ageMs % 86400000) / 3600000);
    var ageText = ageDays > 0 ? ageDays + 'd ' + ageHours + 'h old' : ageHours + 'h old';
    html += '<div class="sla-ticket-age">Ticket age: ' + ageText + '</div>';
  }

  // Partner escalation status
  html += '<div class="sla-partner-row">';
  html += '<span class="sla-partner-label">Partner Escalation</span>';
  if (data.partner) {
    html += '<span class="sla-badge sla-badge-purple">' + escapeHtml(data.partner) + '</span>';
  } else {
    html += '<span class="sla-badge sla-badge-gray">None</span>';
  }
  html += '</div>';

  // Metrics
  var coreLabels = { '1st Response': 1, 'Next Response': 1, 'Resolution': 1 };
  var coreDone = false;

  for (var i = 0; i < metrics.length; i++) {
    var m = metrics[i];

    if (!coreLabels[m.label] && !coreDone) {
      html += '<div class="sla-divider"></div>';
      coreDone = true;
    }

    if (m.placeholder) {
      html += '<div class="sla-metric" data-sla-label="' + escapeHtml(m.label) + '">' +
        '<div class="sla-metric-hdr">' +
          '<span class="sla-metric-lbl">' + escapeHtml(m.label) + '</span>' +
          '<span class="sla-metric-time sla-not-configured">Not configured</span>' +
        '</div></div>';
      continue;
    }

    var st = m.met ? 'met' : slaStatus(m.elapsedMs, m.targetMs);
    var p = m.met ? 100 : slaPct(m.elapsedMs, m.targetMs);
    var timeText;

    if (m.met) {
      timeText = 'Met' + (m.elapsedMs > 0 ? ' (' + slaFormatDuration(m.elapsedMs) + ')' : '');
    } else if (m.elapsedMs >= m.targetMs) {
      timeText = 'BREACHED ' + slaFormatDuration(m.elapsedMs - m.targetMs) + ' ago';
    } else {
      timeText = slaFormatDuration(m.targetMs - m.elapsedMs) + ' left';
    }

    html += '<div class="sla-metric sla-st-' + st + '" data-sla-label="' + escapeHtml(m.label) + '">' +
      '<div class="sla-metric-hdr">' +
        '<span class="sla-metric-lbl">' + escapeHtml(m.label) + '</span>' +
        '<span class="sla-metric-time">' + timeText + '</span>' +
      '</div>' +
      '<div class="sla-bar-bg"><div class="sla-bar-fill" style="width:' + p + '%"></div></div>' +
    '</div>';
  }

  // ── Actions Taken Section ──
  html += '<div class="sla-divider" style="margin-top:18px;"></div>';
  html += '<div class="ctx-section" style="margin-top:12px;">';
  html += '<h4 style="font-size:11px;font-weight:700;letter-spacing:0.5px;color:var(--text-secondary);margin:0 0 10px;">ACTIONS TAKEN</h4>';
  html += '<div id="actions-trail">';
  html += '<div style="font-size:12px;color:var(--text-muted);">Loading trail...</div>';
  html += '</div></div>';

  container.innerHTML = html;

  // Load actions trail
  loadActionsTrail();
}

async function loadActionsTrail() {
  var trailEl = document.getElementById('actions-trail');
  if (!trailEl || !requesterEmail) return;

  try {
    var resp = await zaraFetch(serverUrl + '/api/context?email=' + encodeURIComponent(requesterEmail));
    var data = await resp.json();
    var actions = data.actions || data.trail || [];
    if (actions.length === 0) {
      trailEl.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">No actions recorded yet.</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < Math.min(actions.length, 10); i++) {
      var a = actions[i];
      var trailType = (a.source || 'system').toLowerCase();
      if (trailType === 'zara' || trailType === 'ai') trailType = 'zara';
      else if (trailType === 'agent' || trailType === 'user') trailType = 'agent';
      else trailType = 'system';
      html += '<div class="trail-item">';
      html += '<div class="trail-dot td-' + trailType + '"></div>';
      html += '<div class="trail-body">';
      html += '<div class="trail-summary">' + escapeHtml(a.summary || a.action || a.description || '') + '</div>';
      html += '<div class="trail-time">' + escapeHtml(a.time || fmtDateTime(a.timestamp || a.created_at) || '') + '</div>';
      html += '</div>';
      html += '<span class="trail-source">' + escapeHtml(trailType === 'zara' ? 'Zara' : trailType === 'agent' ? 'Agent' : 'System') + '</span>';
      html += '</div>';
    }
    trailEl.innerHTML = html;
  } catch (e) {
    trailEl.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">Could not load trail.</div>';
  }
}

function startSlaCountdown(container) {
  if (_slaInterval) clearInterval(_slaInterval);
  _slaInterval = setInterval(function() {
    if (!_slaMetrics) return;
    var n = Date.now();
    for (var i = 0; i < _slaMetrics.length; i++) {
      var m = _slaMetrics[i];
      if (m.met || !m.breachAt) continue;
      m.elapsedMs = m.targetMs - Math.max(m.breachAt - n, 0);
      if (m.elapsedMs >= m.targetMs) m.elapsedMs = n - (m.breachAt - m.targetMs);
    }
    // Update bars in place
    for (var i = 0; i < _slaMetrics.length; i++) {
      var m = _slaMetrics[i];
      var el = container.querySelector('[data-sla-label="' + m.label + '"]');
      if (!el || m.placeholder) continue;

      var st = m.met ? 'met' : slaStatus(m.elapsedMs, m.targetMs);
      var p = m.met ? 100 : slaPct(m.elapsedMs, m.targetMs);
      var timeText;
      if (m.met) {
        timeText = 'Met' + (m.elapsedMs > 0 ? ' (' + slaFormatDuration(m.elapsedMs) + ')' : '');
      } else if (m.elapsedMs >= m.targetMs) {
        timeText = 'BREACHED ' + slaFormatDuration(m.elapsedMs - m.targetMs) + ' ago';
      } else {
        timeText = slaFormatDuration(m.targetMs - m.elapsedMs) + ' left';
      }

      el.className = 'sla-metric sla-st-' + st;
      var timeEl = el.querySelector('.sla-metric-time');
      if (timeEl) timeEl.textContent = timeText;
      var fillEl = el.querySelector('.sla-bar-fill');
      if (fillEl) fillEl.style.width = p + '%';
    }
  }, 1000);
}

// ══════════════════════════════════════════════════════════════
// TAB 4: AI QUERY — CS-restricted chat
// ══════════════════════════════════════════════════════════════
function updateAIGreeting() {
  var greetingEl = document.getElementById('ai-greeting-text');
  if (!greetingEl || !currentLob) return;
  var lobName = currentLob.displayName || 'this customer';
  var topics = '<strong>account, billing, troubleshooting</strong>';
  if (currentLob.lobId === 'meow_mobile') {
    topics = '<strong>account, orders, eSIM setup, billing, port-in status</strong>, and <strong>troubleshooting</strong>';
  } else if (currentLob.lobId === 'meow_pager') {
    topics = '<strong>pager status, signal issues, message queue</strong>, and <strong>device replacement</strong>';
  } else if (currentLob.lobId === 'meow_stem') {
    topics = '<strong>tracker, subscription, workout data, challenges</strong>, and <strong>app issues</strong>';
  }
  greetingEl.innerHTML = 'I can help with ' + escapeHtml(lobName) + ' ' + topics + '. What do you need?';
}

var CS_SYSTEM_PREFIX = '[SYSTEM: You are Zara, a customer support AI assistant for Meow Mobile. ONLY answer questions related to: customer accounts, orders, billing, payments, eSIM/SIM troubleshooting, port-in/number porting, network issues, Mochi chat history, ticket management, and general customer support operations. If the user asks about topics unrelated to customer support (e.g. coding, general knowledge, creative writing, etc.), politely decline and say: "I can only help with customer support topics. Try asking about this customer\'s account, orders, or issues."]\n\n';

function addAIMsg(html, sender) {
  var container = document.getElementById('ai-messages');
  var div = document.createElement('div');
  div.className = 'ai-msg ' + sender;
  var avContent = sender === 'user' ? '&#x1F464;' : '&#x2728;';
  div.innerHTML = '<div class="ai-av">' + avContent + '</div><div class="ai-body">' + html + '</div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function addLoadingMsg() {
  return addAIMsg('<div class="loading-dots"><span></span><span></span><span></span></div><span class="thinking"> Thinking & querying data sources...</span>', 'assistant');
}

async function sendAI() {
  if (isLoading) return;
  var input = document.getElementById('ai-input');
  var text = input.value.trim();
  if (!text) return;

  addAIMsg(escapeHtml(text), 'user');
  input.value = '';
  input.style.height = 'auto';

  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  var loading = addLoadingMsg();
  var startTime = Date.now();

  try {
    var resp = await zaraFetch(serverUrl + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: CS_SYSTEM_PREFIX + text,
        sessionId: sessionId,
        lobId: currentLob ? currentLob.lobId : null,
        customerContext: briefData ? {
          email: requesterEmail,
          userId: briefData.individualId,
        } : null,
      }),
    });
    var data = await resp.json();
    loading.remove();

    var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    var html = markdownToHtml(data.response || 'No response received.');

    if (data.toolsUsed && data.toolsUsed.length > 0) {
      var toolNames = data.toolsUsed.map(function(t) { return t.tool; }).join(', ');
      html += '<div class="tools-badge">Tools: ' + escapeHtml(toolNames) + ' &middot; ' + elapsed + 's</div>';
    }

    addAIMsg(html, 'assistant');
  } catch (err) {
    loading.remove();
    addAIMsg('<span class="error-text">Error: ' + escapeHtml(err.message) + '</span>', 'assistant');
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
  }
}

function handleAIKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAI(); }
}

document.getElementById('ai-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});
</script>
