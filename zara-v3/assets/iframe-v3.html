<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Zara v3</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  font-size:13px;line-height:1.5;color:var(--text-primary);background:var(--surface);
  overflow-x:hidden;
}

/* ── Loading ────────────────────────────────────────────── */
.loading-bar{
  height:3px;background:linear-gradient(90deg,#1F73B7,#7B1FA2,#1F73B7);
  background-size:200%;animation:shimmer 1.5s infinite;
  position:fixed;top:0;left:0;right:0;z-index:100;display:none;
}
.loading-bar.active{display:block;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── LOB Theme Variables ── */
:root{--lob-color:#1F73B7;--lob-bg:#EDF7FF;}

/* ── LOB Banner (demo style) ─────────────────────────────── */
.lob-banner{
  display:flex;align-items:center;gap:8px;padding:8px 14px;
  background:var(--lob-bg);border-bottom:2px solid var(--lob-color);
  font-size:11px;font-weight:700;color:var(--lob-color);
  text-transform:uppercase;letter-spacing:.6px;
}
.lob-banner .lob-icon{font-size:16px;}
.lob-banner .lob-tag{
  margin-left:auto;font-size:10px;padding:2px 8px;border-radius:10px;
  background:var(--lob-color);color:#FFF;font-weight:600;
}

/* ── LOB Badge (old — kept for compat but hidden by default) ─ */
.lob-badge{
  display:none;align-items:center;gap:8px;padding:8px 14px;
  background:var(--lob-color, #6C5CE7);color:#fff;font-size:12px;font-weight:600;
  border-radius:0;margin:0;
}
.lob-badge .lob-icon{font-size:16px;}
.lob-badge .lob-name{flex:1;}
.lob-badge .lob-plan{font-size:11px;opacity:.8;font-weight:400;}
.lob-picker{
  padding:10px 14px;background:var(--bg-amber);border-bottom:1px solid var(--border);
  display:none;
}
.lob-picker label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px;display:block;}
.lob-picker select{
  width:100%;padding:6px 8px;border:1px solid var(--border-strong);border-radius:4px;
  font-size:13px;background:var(--surface);color:var(--text-primary);
}

/* ── Search ─────────────────────────────────────────────── */
.ctx-search{display:flex;gap:6px;padding:12px 14px 0 14px;margin-bottom:0;}
.ctx-search input{
  flex:1;padding:7px 10px;border:1px solid var(--border-strong);border-radius:4px;font-size:13px;
}
.ctx-search button{
  padding:7px 14px;background:var(--action-primary);color:#fff;border:none;border-radius:4px;
  font-size:12px;font-weight:600;white-space:nowrap;
}
.ctx-search button:hover{background:var(--action-primary-hover);}
.ctx-search button:disabled{background:var(--bg-disabled);cursor:not-allowed;}

/* ── Tabs ───────────────────────────────────────────────── */
.ci-tabs{
  display:flex;border-bottom:1px solid var(--border);background:var(--surface-muted);
}
.ci-tab{
  flex:1;padding:9px 8px;text-align:center;font-size:12px;font-weight:600;
  color:var(--text-secondary);background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;transition:all .15s;
}
.ci-tab:hover{color:var(--lob-color);background:var(--lob-bg);}
.ci-tab.active{color:var(--lob-color);border-bottom-color:var(--lob-color);background:var(--surface);}
.ci-tab-content{display:none;padding:14px;}
.ci-tab-content.active{display:block;}

/* ── Context Sections ──────────────────────────────────── */
.ctx-section{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border-light);}
.ctx-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.ctx-section h4{
  font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.ctx-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px;}
.ctx-row .lbl{color:var(--text-secondary);font-weight:500;}
.ctx-row .val{color:var(--text-primary);font-weight:500;text-align:right;max-width:55%;word-break:break-word;}
.ctx-row .val.mono{font-family:"SF Mono",Monaco,Consolas,monospace;font-size:11px;}
.ctx-placeholder{
  padding:20px;text-align:center;color:var(--text-muted);font-size:13px;
  background:var(--surface-muted);border:1px dashed var(--border-strong);border-radius:6px;
}

/* ── Customer Compact Card ─────────────────────────────── */
.customer-card{
  padding:10px 12px;border-radius:6px;background:var(--surface-muted);border:1px solid var(--border);margin-bottom:12px;
}
.customer-card .cc-name{font-size:14px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:6px;}
.customer-card .cc-row{display:flex;gap:12px;font-size:12px;color:var(--text-secondary);margin-top:3px;}
.customer-card .cc-row span{display:flex;align-items:center;gap:3px;}

/* ── Funnel Stage ──────────────────────────────────────── */
.funnel{display:flex;gap:2px;margin-bottom:4px;}
.funnel-step{
  flex:1;padding:6px 4px;text-align:center;font-size:10px;font-weight:600;
  border-radius:4px;background:var(--surface-sunken);color:var(--text-muted);position:relative;
}
.funnel-step.completed{background:var(--bg-green);color:var(--green);}
.funnel-step.current{background:var(--bg-amber);color:var(--amber);box-shadow:0 0 0 2px #FFCC80;}
.funnel-step.error{background:var(--bg-red);color:var(--red);box-shadow:0 0 0 2px #F8A0A8;}
.funnel-step.pending{background:var(--surface-sunken);color:var(--text-muted);}
.funnel-label{font-size:11px;color:var(--text-secondary);margin-top:4px;font-weight:500;}

/* ── Badge ─────────────────────────────────────────────── */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.badge-green{background:var(--bg-green);color:var(--green);}
.badge-amber{background:var(--bg-amber);color:var(--amber);}
.badge-red{background:var(--bg-red);color:var(--red);}
.badge-blue{background:var(--bg-blue);color:var(--blue);}
.badge-gray{background:var(--bg-gray);color:var(--text-secondary);}
.badge-purple{background:var(--bg-purple);color:var(--purple);}

/* ── Hero Card LOB badge (inline) ────────────────────── */
.hc-lob-badge{
  display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;
  background:var(--lob-bg);color:var(--lob-color);font-size:10px;font-weight:700;
}
.hc-meta{display:flex;gap:10px;margin-top:6px;font-size:11px;}
.hc-confidence{display:flex;align-items:center;gap:4px;}
.hc-dot{width:7px;height:7px;border-radius:50%;}
.confidence-high .hc-dot{background:var(--confidence-high);}
.confidence-medium .hc-dot{background:var(--confidence-medium);}
.confidence-low .hc-dot{background:var(--confidence-low);}
.hc-source{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--bg-purple);color:var(--purple);font-weight:600;}

/* ── Diagnostic Sequence (demo style) ────────────────── */
.diag-sequence{margin-bottom:14px;}
.diag-header{
  font-size:11px;font-weight:700;color:var(--lob-color);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.diag-progress{font-size:10px;color:var(--text-secondary);font-weight:600;}
.diag-step{
  display:flex;align-items:flex-start;gap:10px;padding:8px 10px;
  border-radius:6px;margin-bottom:4px;transition:all .2s;
}
.diag-step.step-completed{background:var(--urgency-low-bg);}
.diag-step.step-current{background:var(--lob-bg);border:1px solid var(--lob-color);}
.diag-step.step-locked{background:var(--surface-muted);opacity:.6;}
.diag-step.step-skipped{background:var(--urgency-med-bg);}
.diag-num{
  width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;
}
.step-completed .diag-num{background:var(--green);color:#FFF;}
.step-current .diag-num{background:var(--lob-color);color:#FFF;}
.step-locked .diag-num{background:var(--border-strong);color:#FFF;}
.step-skipped .diag-num{background:var(--amber);color:#FFF;}
.diag-step .diag-label{font-size:12px;font-weight:600;color:var(--text-primary);}
.diag-step .diag-desc{font-size:11px;color:var(--text-secondary);margin-top:2px;}

/* ── CTA Grid (demo style) ───────────────────────────── */
.cta-section{margin-bottom:14px;}
.cta-section-label{
  font-size:11px;font-weight:700;color:var(--text-secondary);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;
}
.cta-grid{display:flex;flex-wrap:wrap;gap:6px;}
.cta-btn{
  display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:6px;
  border:1px solid var(--border-strong);background:var(--surface);
  font-size:12px;font-weight:600;color:var(--text-primary);
  cursor:pointer;transition:all .2s;flex:0 0 auto;
}
.cta-btn:hover{border-color:var(--lob-color);background:var(--lob-bg);color:var(--lob-color);}
.cta-btn.cta-done{border-color:var(--green);background:var(--bg-green);color:var(--green);cursor:default;}
.cta-btn .cta-icon{font-size:14px;}
.cta-btn .cta-status{font-size:10px;margin-left:4px;font-weight:700;}
.cta-btn:disabled{opacity:.5;cursor:not-allowed;}

/* ── CTA Result Card ─────────────────────────────────── */
.cta-result{
  margin-top:8px;padding:10px 12px;border-radius:6px;
  border-left:3px solid var(--lob-color);background:var(--lob-bg);
  font-size:12px;line-height:1.5;
}
.cta-result .cr-title{font-weight:700;color:var(--lob-color);margin-bottom:4px;}
.cta-result .cr-row{display:flex;justify-content:space-between;padding:2px 0;}
.cta-result .cr-label{color:var(--text-secondary);}
.cta-result .cr-value{font-weight:600;color:var(--text-primary);}
.cta-result .cr-alert{margin-top:6px;padding:6px 8px;border-radius:4px;font-weight:600;font-size:11px;}
.cr-alert.alert-red{background:var(--bg-red);color:var(--red);border:1px solid #F8A0A8;}
.cr-alert.alert-amber{background:var(--bg-amber);color:var(--amber);border:1px solid #FFCC80;}
.cr-alert.alert-green{background:var(--bg-green);color:var(--green);border:1px solid #86CFAC;}

/* ── Product Portfolio ───────────────────────────────── */
.product-portfolio{margin-bottom:14px;}
.pp-item{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;
  border:1px solid var(--border);margin-bottom:4px;font-size:12px;
}
.pp-item.pp-active{border-color:var(--lob-color);background:var(--lob-bg);}
.pp-icon{font-size:16px;}
.pp-plan{font-weight:600;color:var(--text-primary);flex:1;}
.pp-status{font-size:11px;font-weight:600;}

/* ── Actions Trail ───────────────────────────────────── */
.trail-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:12px;}
.trail-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.trail-dot.td-zara{background:var(--lob-color);}
.trail-dot.td-agent{background:var(--purple);}
.trail-dot.td-system{background:var(--text-secondary);}
.trail-body{flex:1;}
.trail-summary{font-weight:600;color:var(--text-primary);}
.trail-time{font-size:10px;color:var(--text-muted);margin-top:2px;}
.trail-source{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--bg-gray);color:var(--text-secondary);font-weight:600;}

/* ── Triage Redesign — CSS Variables ──────────────────── */
:root{
  --confidence-high:#CC3340;--confidence-medium:#AD5E18;--confidence-low:#1F73B7;
  --frustration-high:#CC3340;--frustration-med:#AD5E18;--frustration-low:#038153;
  --action-primary:#1F73B7;--action-primary-hover:#155A8A;--action-send:#038153;--action-send-hover:#026B44;
  --surface:#fff;--surface-muted:#FAFAFA;--surface-sunken:#F0F0F0;
  --border:#E9EBED;--border-light:#F0F0F0;--border-strong:#D8DCDE;
  --text-primary:#2F3941;--text-secondary:#68737D;--text-muted:#999;--text-meta:#87929D;
  --bg-disabled:#C2C8CC;
  --green:#038153;--red:#CC3340;--amber:#AD5E18;--blue:#1F73B7;--purple:#7B1FA2;
  --orange:#C96400;--indigo:#7B68EE;--dark-amber:#C45500;--dark-purple:#6A27B8;
  --bg-green:#D1E8DF;--bg-amber:#FFF4E0;--bg-red:#FFEEF0;--bg-blue:#EDF7FF;--bg-purple:#F3E8FF;--bg-gray:#F0F0F0;
  --urgency-low-bg:#F6FDF9;--urgency-med-bg:#FFF8F0;--urgency-high-bg:#FFF0F0;
  --chat-assistant-bg:#E8DEF8;--chat-user-body-bg:#EDF7FF;--chat-user-body-border:#C2DEFF;
  --scrollbar-thumb:#D8DCDE;--line-through-color:#C2C8CC;--diag-border:#F5F5F5;
}

/* ── Hero Card ────────────────────────────────────────── */
.hero-card{
  padding:12px 14px;border-radius:8px;background:var(--surface);
  border:1px solid var(--border);border-left:4px solid var(--lob-color);margin-bottom:10px;
}
.hero-card .hc-top{
  display:flex;justify-content:space-between;align-items:center;
}
.hero-card .hc-name{font-size:15px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:6px;}
.hero-card .hc-cohort-hint{font-size:11px;color:var(--text-secondary);margin-top:4px;}
.hero-card .hc-problem{margin-top:8px;font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.4;}
.hero-card .hc-no-problem{font-size:13px;color:var(--text-muted);font-style:italic;margin-top:8px;}

/* ── Urgency Strip ────────────────────────────────────── */
.urgency-strip{
  padding:8px 12px;border-radius:6px;font-size:12px;font-weight:500;
  cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:6px;
  transition:all .15s;
}
.urgency-strip:hover{filter:brightness(.97);}
.urgency-strip.frustration-low{
  border-left:3px solid var(--frustration-low);background:var(--urgency-low-bg);color:var(--text-primary);
}
.urgency-strip.frustration-med{
  border-left:3px solid var(--frustration-med);background:var(--urgency-med-bg);color:var(--text-primary);
}
.urgency-strip.frustration-high{
  border-left:3px solid var(--frustration-high);background:var(--urgency-high-bg);color:var(--text-primary);
}
.urgency-strip .us-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.frustration-low .us-dot{background:var(--frustration-low);}
.frustration-med .us-dot{background:var(--frustration-med);}
.frustration-high .us-dot{background:var(--frustration-high);}
.urgency-strip .us-chevron{
  margin-left:auto;font-size:10px;color:var(--text-muted);transition:transform .15s;
}
.urgency-strip.expanded .us-chevron{transform:rotate(180deg);}
.urgency-contacts{display:none;margin-bottom:10px;}
.urgency-contacts.visible{display:block;}

/* ── Action Card ──────────────────────────────────────── */
.action-card{
  padding:14px;border-radius:8px;background:var(--surface);
  border:1px solid var(--border);margin-bottom:10px;
}
.action-card .ac-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;}
.action-card .ac-icon{
  width:28px;height:28px;min-width:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:13px;
}
.action-card .ac-icon.type-investigate{background:var(--bg-blue);color:var(--blue);}
.action-card .ac-icon.type-ask_info{background:var(--bg-amber);color:var(--amber);}
.action-card .ac-icon.type-customer_action{background:var(--bg-green);color:var(--green);}
.action-card .ac-icon.type-kb_article{background:var(--bg-purple);color:var(--purple);}
.action-card .ac-text{font-size:13px;font-weight:600;color:var(--text-primary);flex:1;line-height:1.4;}
.action-card .ac-result{font-size:12px;color:var(--text-secondary);margin-top:4px;line-height:1.4;}
.action-card .action-btn{
  width:100%;padding:9px 16px;margin-top:10px;border-radius:6px;
  border:none;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;
}
.action-card .action-btn.btn-primary{background:var(--action-primary);color:#fff;}
.action-card .action-btn.btn-primary:hover{background:var(--action-primary-hover);}
.action-card .action-btn.btn-secondary{
  background:var(--surface);color:var(--text-primary);border:1px solid var(--border-strong);
}
.action-card .action-btn.btn-secondary:hover{background:var(--surface-sunken);}
.action-card .action-btn.btn-link{
  background:none;color:var(--action-primary);padding:6px 0;text-align:left;
}
.action-card .action-btn.btn-link:hover{text-decoration:underline;}
.remaining-steps{margin-bottom:10px;}
.remaining-steps .rs-item{
  display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:12px;color:var(--text-primary);
}
.remaining-steps .rs-icon{
  width:20px;height:20px;min-width:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:10px;
}
.remaining-steps .rs-icon.type-investigate{background:var(--bg-blue);color:var(--blue);}
.remaining-steps .rs-icon.type-ask_info{background:var(--bg-amber);color:var(--amber);}
.remaining-steps .rs-icon.type-customer_action{background:var(--bg-green);color:var(--green);}
.remaining-steps .rs-icon.type-kb_article{background:var(--bg-purple);color:var(--purple);}
.remaining-steps .rs-icon.type-ai_done{background:var(--bg-green);color:var(--green);}
.remaining-steps .rs-text{flex:1;line-height:1.4;}
.remaining-steps .rs-text a{color:var(--action-primary);text-decoration:none;}
.remaining-steps .rs-text a:hover{text-decoration:underline;}
.remaining-steps .rs-done{color:var(--text-secondary);text-decoration:line-through;text-decoration-color:var(--line-through-color);}
.completed-toggle{
  font-size:11px;color:var(--action-primary);background:none;border:none;
  cursor:pointer;font-weight:600;padding:4px 0;
}
.completed-toggle:hover{text-decoration:underline;}
.completed-steps{display:none;}
.completed-steps.visible{display:block;}

/* ── Section Label ────────────────────────────────────── */
.section-label{
  font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;
}

/* ── Draft Card ───────────────────────────────────────── */
.draft-card{
  padding:0;border-radius:8px;border:1px solid var(--border);
  background:var(--surface-muted);overflow:hidden;margin-bottom:12px;
}
.draft-card .draft-label{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  color:var(--text-secondary);padding:10px 14px 6px;display:flex;align-items:center;gap:6px;
}
.draft-card .draft-preview{
  padding:8px 14px 10px;font-size:12px;line-height:1.5;color:var(--text-primary);
  max-height:80px;overflow:hidden;white-space:pre-wrap;cursor:pointer;position:relative;
}
.draft-card .draft-preview::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:30px;
  background:linear-gradient(transparent,var(--surface-muted));pointer-events:none;
}
.draft-card .draft-preview.expanded{max-height:none;overflow:visible;}
.draft-card .draft-preview.expanded::after{display:none;}
.draft-card .draft-preview.hidden{display:none;}
.draft-card .draft-actions{
  display:flex;gap:6px;padding:8px 14px;border-top:1px solid var(--border);
}
.draft-card .draft-actions .btn-edit{
  padding:6px 14px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;
  background:var(--surface-sunken);color:var(--text-primary);border:none;
}
.draft-card .draft-actions .btn-edit:hover{background:var(--border);}
.draft-card .draft-actions .btn-send-reply{
  padding:6px 14px;border:none;border-radius:4px;
  background:var(--lob-color);color:#fff;font-size:12px;font-weight:600;cursor:pointer;
}
.draft-card .draft-actions .btn-send-reply:hover{opacity:.9;}
.draft-card .draft-edit-area{display:none;padding:10px 14px;}
.draft-card .draft-edit-area textarea{
  width:100%;min-height:140px;padding:10px;border:1px solid #86EFAC;border-radius:6px;
  font-size:13px;line-height:1.6;resize:vertical;font-family:inherit;color:#1a3a2a;
  background:var(--surface);
}
.draft-card .draft-edit-area textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(3,129,83,.15);}
.draft-card .draft-edit-area.active{display:block;}

/* ── Escalation Package Card ─────────────────────────── */
.escalation-card{
  border-radius:10px;background:linear-gradient(135deg,#FFFBEB 0%,#FEF3C7 100%);
  border:2px solid #FBBF24;border-left:4px solid #F59E0B;overflow:hidden;margin-bottom:12px;
  box-shadow:0 2px 8px rgba(245,158,11,.12);
}
.escalation-card .escalation-label{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:#92400E;padding:10px 14px 0;display:flex;align-items:center;gap:6px;
}
.escalation-card .escalation-label::before{content:'\u2709';font-size:14px;}
.escalation-vendor-badge{
  font-size:10px;font-weight:600;color:#fff;background:#F59E0B;
  padding:2px 8px;border-radius:10px;margin-left:auto;
}
.escalation-card .esc-completeness{
  padding:4px 14px 0;font-size:11px;color:#92400E;
}
.esc-triage-badge{
  font-size:10px;color:#92400E;background:#FEF3C7;
  padding:2px 8px;border-radius:10px;margin:4px 14px 0;display:inline-block;
}
.escalation-card .draft-preview{
  padding:8px 14px 10px;font-size:13px;line-height:1.6;color:#451A03;
  max-height:80px;overflow:hidden;white-space:pre-wrap;cursor:pointer;position:relative;
}
.escalation-card .draft-preview::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:28px;
  background:linear-gradient(transparent,#FEF3C7);pointer-events:none;
}
.escalation-card .draft-preview.expanded{max-height:none;overflow:visible;}
.escalation-card .draft-preview.expanded::after{display:none;}
.escalation-card .draft-preview.hidden{display:none;}
.escalation-card .draft-edit-area{display:none;padding:10px 14px;}
.escalation-card .draft-edit-area textarea{
  width:100%;min-height:140px;padding:10px;border:1px solid #FBBF24;border-radius:6px;
  font-size:13px;line-height:1.6;resize:vertical;font-family:inherit;color:#451A03;
  background:#FFFBEB;
}
.escalation-card .draft-edit-area textarea:focus{outline:none;border-color:#F59E0B;box-shadow:0 0 0 3px rgba(245,158,11,.15);}
.escalation-card .draft-edit-area.active{display:block;}
.escalation-card .draft-actions{
  display:flex;gap:8px;padding:10px 14px;border-top:1px solid #FDE68A;background:rgba(255,255,255,.5);
}
.escalation-card .draft-actions .btn-edit{
  flex:1;padding:8px 12px;border:1px solid #FBBF24;border-radius:6px;
  background:#FFFBEB;color:#92400E;font-size:12px;font-weight:600;cursor:pointer;
}
.escalation-card .draft-actions .btn-edit:hover{background:#FEF3C7;border-color:#F59E0B;}
.escalation-card .draft-actions .btn-copy{
  padding:8px 20px;border:none;border-radius:6px;
  background:#F59E0B;color:#fff;font-size:12px;font-weight:700;cursor:pointer;
  box-shadow:0 1px 3px rgba(245,158,11,.3);
}
.escalation-card .draft-actions .btn-copy:hover{background:#D97706;box-shadow:0 2px 6px rgba(245,158,11,.4);}

/* ── Draft Verification Checklist ─────────────────────── */
.draft-checklist{
  padding:8px 14px;border-top:1px solid #BBF7D0;
}
.draft-facts{
  display:flex;flex-wrap:wrap;gap:4px 6px;margin-bottom:4px;
}
.draft-fact{
  font-size:11px;color:var(--green);background:#DCFCE7;
  padding:2px 8px;border-radius:10px;font-weight:500;
  white-space:nowrap;
}
.draft-flag{
  font-size:11px;color:#92400E;background:#FEF3C7;
  padding:4px 8px;border-radius:6px;margin-top:4px;
  line-height:1.4;
}
.draft-sent{
  text-align:center;color:var(--green);font-weight:600;
  font-size:13px;padding:8px 0;
}
.draft-feedback{
  padding:8px 14px;border-top:1px solid #E0E7FF;
  display:flex;flex-wrap:wrap;gap:6px;align-items:center;
}
.feedback-learned{
  font-size:11px;color:#4338CA;background:#EEF2FF;
  padding:3px 10px;border-radius:10px;font-weight:500;
}
.feedback-kb{
  font-size:10px;color:#6B7280;
}

/* ── Troubleshooting Progress ─────────────────────────── */
.ts-card{
  border-radius:8px;background:var(--surface);
  border:1px solid var(--border);padding:12px 14px;margin-bottom:10px;
}
.ts-card .ts-header{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.ts-card .section-label{margin-bottom:0;}
.ts-progress{display:flex;align-items:center;gap:8px;flex:1;}
.ts-progress-bar{
  flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;
}
.ts-progress-fill{
  height:100%;background:var(--action-send);border-radius:2px;transition:width .3s;
}
.ts-progress-label{
  font-size:11px;font-weight:600;color:var(--text-secondary);white-space:nowrap;
}
.ts-card .ts-step.next-pending{
  border-left:3px solid var(--confidence-medium);padding-left:8px;margin-left:-3px;
  background:var(--urgency-med-bg);border-radius:0 4px 4px 0;
}

/* ── Diagnostic Checklist ────────────────────────────── */
.diag-item{
  display:flex;align-items:flex-start;gap:10px;padding:7px 0;
  border-bottom:1px solid var(--diag-border);font-size:13px;
}
.diag-item:last-child{border-bottom:none;}
.diag-check{
  width:20px;height:20px;min-width:20px;border-radius:4px;border:2px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;
  margin-top:1px;flex-shrink:0;
}
.diag-item.checked .diag-check{background:var(--bg-green);border-color:var(--green);color:var(--green);}
.diag-item.error .diag-check{background:var(--bg-red);border-color:var(--red);color:var(--red);}
.diag-item.pending .diag-check{border-color:var(--border-strong);color:transparent;}
.diag-body{flex:1;min-width:0;}
.diag-label{font-size:12px;color:var(--text-secondary);font-weight:500;}
.diag-item.checked .diag-label{color:var(--text-secondary);}
.diag-item.error .diag-label{color:var(--red);font-weight:600;}
.diag-value{
  font-size:13px;font-weight:600;color:var(--text-primary);margin-top:1px;
  word-break:break-word;
}
.diag-item.checked .diag-value{color:var(--text-primary);}
.diag-item.error .diag-value{color:var(--red);}
.diag-item.pending .diag-value{color:var(--text-muted);font-weight:400;font-style:italic;}
.diag-value .mono{font-family:"SF Mono",Monaco,Consolas,monospace;font-size:11px;}

/* ── Issue Info Card (triage intake fields) ────────────── */
.issue-info-card{
  border-radius:8px;background:var(--surface);
  border:1px solid var(--border);padding:12px 14px;margin-bottom:10px;
}
.issue-info-header{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.issue-info-header .section-label{margin-bottom:0;}
.issue-info-item{
  display:flex;align-items:flex-start;gap:10px;padding:7px 0;
  border-bottom:1px solid var(--diag-border);font-size:13px;
}
.issue-info-item:last-child{border-bottom:none;}
.issue-info-icon{
  width:20px;height:20px;min-width:20px;border-radius:4px;border:2px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;font-size:11px;
  margin-top:1px;flex-shrink:0;
}
.issue-info-item.needs-input .issue-info-icon{background:var(--bg-red);border-color:var(--red);color:var(--red);}
.issue-info-item.auto-filled .issue-info-icon{background:var(--bg-green);border-color:var(--green);color:var(--green);}
.issue-info-body{flex:1;min-width:0;}
.issue-info-label{font-size:12px;font-weight:500;}
.issue-info-item.needs-input .issue-info-label{color:var(--red);font-weight:600;}
.issue-info-item.auto-filled .issue-info-label{color:var(--text-secondary);}
.issue-info-val{font-size:12px;margin-top:1px;word-break:break-word;}
.issue-info-item.needs-input .issue-info-val{color:var(--red);font-style:italic;font-weight:400;}
.issue-info-item.auto-filled .issue-info-val{color:var(--text-primary);font-weight:600;}
.issue-info-toggle{
  font-size:11px;color:var(--text-secondary);cursor:pointer;padding:6px 0 2px;
  user-select:none;
}
.issue-info-toggle:hover{color:var(--text-primary);}

/* ── Legacy brief styles (kept for context tab) ───────── */
.brief-problem{
  padding:10px 14px;border-radius:6px;margin-bottom:12px;font-size:13px;font-weight:500;
}
.brief-problem .bp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;opacity:.7;}
.brief-problem .bp-stage{float:right;}

.brief-contact{
  padding:8px 10px;margin-bottom:6px;border-radius:6px;
  background:var(--surface-muted);border:1px solid var(--border);
}
.brief-contact:last-child{margin-bottom:0;}
.brief-contact .bc-header{
  display:flex;align-items:center;gap:6px;margin-bottom:4px;
}
.brief-contact .bc-channel{
  display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;
  text-transform:uppercase;
}
.brief-contact .bc-channel.ch-email{background:var(--bg-blue);color:var(--blue);}
.brief-contact .bc-channel.ch-mochi{background:var(--bg-purple);color:var(--purple);}
.brief-contact .bc-status{font-size:10px;font-weight:600;}
.brief-contact .bc-date{font-size:11px;color:var(--text-muted);margin-left:auto;white-space:nowrap;}
.brief-contact .bc-summary{font-size:12px;color:var(--text-primary);line-height:1.5;}

.brief-step{
  display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:13px;
}
.brief-step .bs-icon{
  width:22px;height:22px;min-width:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:11px;
}
.brief-step .bs-icon.type-investigate{background:var(--bg-blue);color:var(--blue);}
.brief-step .bs-icon.type-ask_info{background:var(--bg-amber);color:var(--amber);}
.brief-step .bs-icon.type-customer_action{background:var(--bg-green);color:var(--green);}
.brief-step .bs-icon.type-kb_article{background:var(--bg-purple);color:var(--purple);}
.brief-step .bs-icon.type-ai_done{background:var(--bg-green);color:var(--green);}
.brief-step .bs-text{flex:1;color:var(--text-primary);}
.brief-step .bs-text a{color:var(--action-primary);text-decoration:none;font-size:12px;}
.brief-step .bs-text a:hover{text-decoration:underline;}

.brief-kv{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;}
.brief-kv .bk-label{color:var(--text-secondary);font-weight:500;}
.brief-kv .bk-value{color:var(--text-primary);font-weight:500;text-align:right;max-width:60%;word-break:break-word;}

/* ── Email Draft Widget ──────────────────────────────────── */
.email-draft{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.email-draft-preview{
  padding:12px 14px;font-size:13px;line-height:1.6;color:var(--text-primary);
  max-height:120px;overflow:hidden;white-space:pre-wrap;cursor:pointer;
  position:relative;
}
.email-draft-preview::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:32px;
  background:linear-gradient(transparent,var(--surface));pointer-events:none;
}
.email-draft-preview.expanded{max-height:none;overflow:visible;}
.email-draft-preview.expanded::after{display:none;}
.email-draft-actions{
  display:flex;gap:6px;padding:8px 14px;border-top:1px solid var(--border);background:var(--surface-muted);
}
.email-draft-actions .btn-review{
  flex:1;padding:7px 12px;border:1px solid var(--border-strong);border-radius:4px;
  background:var(--surface);color:var(--text-primary);font-size:12px;font-weight:600;cursor:pointer;
}
.email-draft-actions .btn-review:hover{background:var(--surface-sunken);}
.email-draft-actions .btn-send{
  padding:7px 16px;border:none;border-radius:4px;
  background:var(--action-send);color:#fff;font-size:12px;font-weight:600;cursor:pointer;
}
.email-draft-actions .btn-send:hover{background:var(--action-send-hover);}
.email-draft-edit{display:none;padding:10px 14px;}
.email-draft-edit textarea{
  width:100%;min-height:140px;padding:10px;border:1px solid var(--border-strong);border-radius:6px;
  font-size:13px;line-height:1.6;resize:vertical;font-family:inherit;color:var(--text-primary);
}
.email-draft-edit textarea:focus{outline:none;border-color:var(--action-primary);box-shadow:0 0 0 3px rgba(31,115,183,.12);}
.email-draft-edit.active{display:block;}
.email-draft-preview.hidden{display:none;}

/* ── Contact Summary ─────────────────────────────────────── */
.contact-summary{padding:10px 14px;border-radius:6px;font-size:13px;line-height:1.6;}
.contact-summary.frustration-low{background:var(--urgency-low-bg);border:1px solid var(--bg-green);color:var(--text-primary);}
.contact-summary.frustration-med{background:var(--urgency-med-bg);border:1px solid #FFE082;color:var(--text-primary);}
.contact-summary.frustration-high{background:var(--urgency-high-bg);border:1px solid #F8A0A8;color:var(--text-primary);}
.cs-count{font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.cs-count .cs-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.frustration-low .cs-dot{background:var(--frustration-low);}
.frustration-med .cs-dot{background:var(--frustration-med);}
.frustration-high .cs-dot{background:var(--frustration-high);}
.cs-body{color:var(--text-primary);}

/* ── Troubleshooting Guide ──────────────────────────────── */
.ts-step{
  display:flex;align-items:flex-start;gap:10px;padding:8px 0;font-size:13px;
  border-bottom:1px solid var(--border-light);
}
.ts-step:last-child{border-bottom:none;}
.ts-check{
  width:20px;height:20px;min-width:20px;border-radius:4px;border:2px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;
  margin-top:1px;
}
.ts-step.done .ts-check{background:var(--bg-green);border-color:var(--green);color:var(--green);}
.ts-step.done .ts-text{color:var(--text-secondary);text-decoration:line-through;text-decoration-color:var(--line-through-color);}
.ts-text{flex:1;color:var(--text-primary);line-height:1.4;}
.ts-source{font-size:10px;color:var(--text-muted);font-style:italic;margin-top:2px;}

/* ── Escalation Panel ──────────────────────────────────── */
.escalation-panel{
  padding:10px 12px;border-radius:6px;margin-bottom:12px;
  background:var(--urgency-med-bg);border:1px solid #FFE082;
}
.escalation-panel.urgent{background:var(--urgency-high-bg);border-color:#F8A0A8;}
.escalation-panel .esc-title{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:var(--amber);margin-bottom:6px;display:flex;align-items:center;gap:4px;
}
.escalation-panel.urgent .esc-title{color:var(--red);}
.escalation-panel .esc-reason{
  display:flex;align-items:flex-start;gap:6px;padding:3px 0;font-size:12px;color:var(--text-primary);
}
.escalation-panel .esc-dot{
  min-width:6px;width:6px;height:6px;border-radius:50%;margin-top:5px;background:var(--amber);
}
.escalation-panel.urgent .esc-dot{background:var(--red);}
.escalation-btn{
  width:100%;padding:8px 14px;margin-top:8px;border-radius:6px;
  font-size:12px;font-weight:600;cursor:pointer;text-align:center;
  background:var(--surface);color:var(--red);border:1px solid #F8A0A8;transition:all .15s;
}
.escalation-btn:hover{background:var(--urgency-high-bg);}
.escalation-btn:disabled{opacity:.5;cursor:not-allowed;}
.escalation-result{
  margin-top:8px;padding:8px;border:1px solid var(--border);border-radius:4px;
  font-size:12px;background:var(--surface);min-height:60px;max-height:150px;
  overflow-y:auto;white-space:pre-wrap;color:var(--text-primary);line-height:1.5;
}

/* ── Skill Block (collapsible) ─────────────────────────── */
.skill-block{
  background:var(--surface-muted);border:1px solid var(--border);border-radius:6px;
  padding:8px 10px;margin-top:8px;
}
.skill-header{display:flex;align-items:center;gap:6px;cursor:pointer;}
.skill-header .skill-icon{
  width:18px;height:18px;min-width:18px;border-radius:4px;
  background:linear-gradient(135deg,#7B1FA2,#1F73B7);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;
}
.skill-header .skill-title{font-size:11px;font-weight:600;color:var(--text-primary);flex:1;}
.skill-header .skill-toggle{font-size:10px;color:var(--text-muted);transition:transform .15s;}
.skill-block.collapsed .skill-body{display:none;}
.skill-block.collapsed .skill-toggle{transform:rotate(-90deg);}
.skill-step{display:flex;align-items:flex-start;gap:6px;padding:3px 0;font-size:11px;}
.skill-step .ss-dot{min-width:6px;width:6px;height:6px;border-radius:50%;margin-top:5px;background:var(--blue);}
.skill-step .ss-text{flex:1;color:var(--text-primary);line-height:1.4;}

/* ── Show More Toggle ──────────────────────────────────── */
.show-more-btn{
  font-size:11px;color:var(--action-primary);background:none;border:none;cursor:pointer;
  font-weight:600;padding:4px 0;
}
.show-more-btn:hover{text-decoration:underline;}

/* ── Correspondence Summary ────────────────────────────── */
.corr-item{
  padding:10px 0;border-bottom:1px solid var(--border);
}
.corr-item:last-child{border-bottom:none;}
.corr-header{
  display:flex;align-items:center;gap:6px;margin-bottom:4px;
}
.corr-icon{font-size:13px;}
.corr-subject{
  font-size:12px;font-weight:600;color:var(--text-primary);flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.corr-status{
  font-size:10px;font-weight:600;text-transform:uppercase;
  padding:1px 6px;border-radius:8px;
}
.corr-status.cs-resolved{background:var(--bg-green);color:var(--green);}
.corr-status.cs-open{background:var(--bg-amber);color:var(--amber);}
.corr-status.cs-escalated{background:var(--bg-red);color:var(--red);}
.corr-summary{
  font-size:12px;color:var(--text-secondary);line-height:1.4;
  margin-bottom:2px;
}
.corr-meta{font-size:11px;color:var(--text-muted);}

/* ── Data Footer ───────────────────────────────────────── */
.data-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px 0 14px;margin-top:8px;border-top:1px solid var(--border);
  font-size:11px;color:var(--text-muted);
}
.data-footer button{
  font-size:12px;color:var(--action-primary);background:none;border:none;cursor:pointer;font-weight:600;
}
.data-footer button:hover{text-decoration:underline;}

/* ── KB Article ────────────────────────────────────────── */
.kb-article{
  display:flex;align-items:center;gap:8px;padding:6px 8px;margin-bottom:4px;
  border-radius:4px;background:var(--surface-muted);border:1px solid var(--border);font-size:12px;
}
.kb-article a{color:var(--action-primary);text-decoration:none;flex:1;}
.kb-article a:hover{text-decoration:underline;}
.kb-article .kb-source{font-size:10px;font-weight:600;color:var(--text-secondary);white-space:nowrap;}

/* ── AI Query Tab ──────────────────────────────────────── */
.ai-chat{
  border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);
  display:flex;flex-direction:column;height:calc(100vh - 100px);
}
.ai-messages{flex:1;overflow-y:auto;padding:12px;background:var(--surface-muted);}
.ai-msg{display:flex;gap:8px;margin-bottom:14px;}
.ai-msg .ai-av{
  width:28px;height:28px;min-width:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.ai-msg.assistant .ai-av{background:var(--chat-assistant-bg);color:var(--purple);}
.ai-msg.user .ai-av{background:var(--bg-green);color:var(--green);}
.ai-msg .ai-body{
  flex:1;padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.5;min-width:0;
}
.ai-msg.assistant .ai-body{background:var(--surface);border:1px solid var(--border);}
.ai-msg.user .ai-body{background:var(--chat-user-body-bg);border:1px solid var(--chat-user-body-border);}
.ai-body ul{margin:6px 0 0 16px;font-size:12px;}
.ai-body li{margin-bottom:2px;}
.ai-body .thinking{color:var(--text-muted);font-style:italic;font-size:12px;}

.ai-input-row{display:flex;border-top:1px solid var(--border);}
.ai-input-row textarea{
  flex:1;padding:10px 12px;border:none;font-size:13px;resize:none;
  min-height:38px;max-height:80px;line-height:1.4;font-family:inherit;
}
.ai-input-row textarea:focus{outline:none;}
.ai-input-row .send-btn{
  padding:0 14px;background:var(--action-primary);color:#fff;border:none;font-weight:700;
  font-size:14px;cursor:pointer;
}
.ai-input-row .send-btn:hover{background:var(--action-primary-hover);}
.ai-input-row .send-btn:disabled{background:var(--bg-disabled);cursor:not-allowed;}

/* ── Tools Badge ───────────────────────────────────────── */
.tools-badge{
  display:inline-flex;align-items:center;gap:4px;margin-top:6px;padding:3px 8px;
  background:var(--bg-purple);border:1px solid var(--chat-assistant-bg);border-radius:4px;
  font-size:10px;color:var(--purple);font-weight:600;
}

/* ── Loading Dots ──────────────────────────────────────── */
@keyframes pulse-dots{0%,80%,100%{opacity:.3}40%{opacity:1}}
.loading-dots span{
  display:inline-block;width:6px;height:6px;margin:0 2px;
  background:var(--purple);border-radius:50%;animation:pulse-dots 1.4s infinite;
}

<script src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
<script>
// ── State ────────────────────────────────────────────────────
var client;
var serverUrl = '';
var requesterEmail = '';
var isLoading = false;
var sessionId = 'zaf-' + Date.now();
var lookupData = null;
var briefData = null;
// v3: LOB state
var currentLob = null;  // { lobId, displayName, shortName, color, icon }
var lobRegistry = [];   // all LOBs from /api/lob/registry

// ── Debug panel helper ──────────────────────────────────────
var _dbgLines = [];
function dbg(msg) {
  console.log('[Zara v3] ' + msg);
  _dbgLines.push('[' + new Date().toLocaleTimeString() + '] ' + msg);
  var el = document.getElementById('dbg-panel');
  if (el) el.textContent = _dbgLines.join('\n');
}

// ── ZAF-aware fetch: use client.request() when inside ZAF ──
function zaraFetch(url, opts) {
  if (client && client.request) {
    var reqOpts = { url: url, type: (opts && opts.method) || 'GET', contentType: 'application/json', dataType: 'json' };
    if (opts && opts.body) reqOpts.data = opts.body;
    return client.request(reqOpts).then(function(data) {
      return { ok: true, status: 200, json: function() { return Promise.resolve(data); } };
    }).catch(function(err) {
      var msg = 'ZAF request failed: ';
      if (err && err.responseText) msg += err.status + ' ' + err.responseText;
      else if (err && err.message) msg += err.message;
      else msg += JSON.stringify(err);
      dbg(msg);
      throw new Error(msg);
    });
  }
  return fetch(url, opts);
}

// ── Initialize ZAF ──────────────────────────────────────────
try {
  client = ZAFClient.init();
  dbg('ZAF client initialized');
  client.invoke('resize', { width: '100%', height: '600px' });

  // Detect Zendesk dark mode
  client.get('currentUser.preferences.colorScheme').then(function(data) {
    var scheme = data['currentUser.preferences.colorScheme'];
    if (scheme === 'dark' || (scheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  }).catch(function() { /* colorScheme pref not available */ });

  // IMPORTANT: Wait for metadata (serverUrl) before loading ticket data
  // This prevents race condition where loadAll fires before serverUrl is set
  client.metadata().then(function(metadata) {
    serverUrl = (metadata.settings && metadata.settings.server_url) || 'http://localhost:3000';
    serverUrl = serverUrl.replace(/\/+$/, '');
    dbg('Server URL: ' + serverUrl);
    document.getElementById('agent-brief-data').innerHTML = '<div class="ctx-placeholder">Connecting to ' + serverUrl + '...</div>';

    // v3: Load LOB registry for picker
    loadLobRegistry();

    // NOW load ticket data (after serverUrl is set)
    return client.get(['ticket.requester.email', 'ticket.id']);
  }).then(function(data) {
    requesterEmail = data['ticket.requester.email'];
    dbg('Requester email: ' + (requesterEmail || '(none)'));
    if (requesterEmail) {
      loadAll(requesterEmail);
    } else {
      showPlaceholder('agent-brief-data', 'No requester email found on this ticket.');
      showPlaceholder('ctx-data', 'No requester email found on this ticket.');
    }
  }).catch(function(err) {
    dbg('Init error: ' + (err.message || String(err)));
    showPlaceholder('agent-brief-data', 'Could not read ticket data. Is this running inside Zendesk?');
    showPlaceholder('ctx-data', 'Could not read ticket data.');
  });

  client.on('ticket.requester.email.changed', function(email) {
    if (email && email !== requesterEmail) {
      requesterEmail = email;
      loadAll(requesterEmail);
    }
  });
} catch (e) {
  serverUrl = window.location.origin || 'http://localhost:3000';
  document.getElementById('search-bar').style.display = 'flex';
  showPlaceholder('agent-brief-data', 'Enter a customer email above to load the agent brief.');
  showPlaceholder('ctx-data', 'Enter a customer email above to load context.');
  showPlaceholder('sla-data', 'Enter a customer email above to load SLA data.');
  // v3: Load LOB registry for picker
  loadLobRegistry();
}

function searchCustomer() {
  var input = document.getElementById('ctx-search-input');
  var email = input.value.trim();
  if (!email) return;
  requesterEmail = email;
  loadAll(email);
}

document.addEventListener('DOMContentLoaded', function() {
  var searchInput = document.getElementById('ctx-search-input');
